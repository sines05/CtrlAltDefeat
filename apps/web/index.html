<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Museum MVP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        line-height: 1.5;
        background: #f4efe5;
        color: #1d1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f7f2ea 0%, #efe4d1 100%);
      }

      #app {
        padding: 24px;
      }

      .scene-shell {
        display: grid;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .scene-header,
      .tour-rail,
      .chat-shell,
      .tts-panel,
      .room-shell,
      .fallback-panel {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(76, 56, 36, 0.12);
        border-radius: 18px;
        box-shadow: 0 12px 32px rgba(76, 56, 36, 0.08);
      }

      .scene-header,
      .chat-shell,
      .tts-panel,
      .tour-rail,
      .fallback-panel {
        padding: 20px;
      }

      .room-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 20px;
        padding: 20px;
      }

      .room-stage {
        position: relative;
        min-height: 360px;
        border-radius: 14px;
        padding: 20px;
        background: radial-gradient(circle at top, #e7dac4 0%, #cfb99a 55%, #b59675 100%);
        overflow: hidden;
      }

      .room-plane {
        position: absolute;
        inset-inline: 0;
        opacity: 0.5;
      }

      .room-wall {
        top: 0;
        height: 68%;
        background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0));
      }

      .room-floor {
        bottom: 0;
        height: 34%;
        background: linear-gradient(180deg, rgba(120, 78, 48, 0), rgba(120, 78, 48, 0.35));
      }

      .room-plinth,
      .avatar-shell,
      .avatar-shell--degraded,
      .hotspot-list,
      .hotspot-overlay {
        position: relative;
        z-index: 1;
      }

      .hotspot-overlay {
        min-height: 180px;
      }

      .hotspot-chip {
        position: absolute;
        transform: translate(-50%, -50%);
        min-width: 160px;
        max-width: 220px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(76, 56, 36, 0.16);
        background: rgba(255, 255, 255, 0.94);
      }

      .chat-shell {
        display: grid;
        gap: 16px;
      }

      .chat-thread {
        display: grid;
        gap: 12px;
      }

      .chat-bubble {
        padding: 14px 16px;
        border-radius: 16px;
      }

      .chat-bubble--user {
        background: #efe3cf;
        border: 1px solid rgba(120, 78, 48, 0.15);
      }

      .chat-bubble--assistant {
        background: #fff;
        border: 1px solid rgba(76, 56, 36, 0.12);
      }

      .chat-bubble__label {
        margin: 0 0 8px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .chat-bubble__body p,
      .chat-status p,
      .qa-confidence,
      .tts-transcript p,
      .tts-error,
      .chat-log li {
        margin: 0;
      }

      .chat-status,
      .chat-log,
      .tts-controls,
      .tts-transcript {
        display: grid;
        gap: 8px;
      }

      .chat-status,
      .chat-log {
        padding: 14px 16px;
        border-radius: 14px;
        background: #faf6ef;
        border: 1px solid rgba(76, 56, 36, 0.1);
      }

      .chat-compose {
        display: grid;
        gap: 10px;
      }

      .chat-compose label {
        display: grid;
        gap: 8px;
      }

      .chat-compose textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(76, 56, 36, 0.18);
        background: #fffdf9;
        font: inherit;
      }

      .chat-log ul,
      .qa-citations,
      .tour-rail ol {
        margin: 0;
        padding-left: 20px;
      }

      button {
        width: fit-content;
        min-width: 120px;
        padding: 12px 16px;
        border: 0;
        border-radius: 12px;
        background: #805b38;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .tts-panel audio {
        width: 100%;
      }

      @media (max-width: 900px) {
        #app {
          padding: 16px;
        }

        .room-shell {
          grid-template-columns: 1fr;
        }

        .room-stage {
          min-height: 280px;
        }

        .hotspot-chip {
          min-width: 140px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <h1>3D Museum MVP</h1>
      <p>Bootstrap shell.</p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
