<!DOCTYPE html>
<html lang="{{lang_attr}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  {{viewer_head}}
  <style>
    .board{display:flex;gap:1rem;overflow-x:auto;padding-bottom:1rem;align-items:flex-start;}
    .board-col{flex:0 0 16rem;min-width:0;}
    .board-col h2{font-size:.95rem;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin:.2rem 0 .6rem;}
    .board-col .col-body{display:flex;flex-direction:column;gap:.6rem;}
    .card{cursor:pointer;} .card:hover{border-color:var(--accent);}
    .card .cid{font-weight:600;font-size:.9rem;word-break:break-word;}
    .card .ctitle{font-size:.82rem;color:var(--muted);margin:.2rem 0 .4rem;}
    .col-empty{color:var(--muted);font-size:.8rem;padding:.4rem;}
    /* .ps-detail* live in _viewer-head.html (shared design system). */
    @media print{.board{flex-wrap:wrap;}}
  </style>
</head>
<body>
  <button class="ps-toggle" onclick="psToggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">☾</button>
  <div class="ps-wrap">
    <h1>{{title}}</h1>
    <div class="ps-meta">Generated {{generated_at}} · Product: {{product_name}}</div>
    {{libs_banner}}
    <input class="ps-search" id="ps-search" type="search" autocomplete="off">
    <div class="ps-facets" id="ps-facets"></div>
    <div class="board" id="ps-board"></div>
  </div>
  <aside class="ps-detail" id="ps-detail" hidden aria-label="Artifact detail">
    <button class="close" onclick="psCloseDetail()" aria-label="Close">×</button>
    <h2 id="ps-detail-title"></h2>
    <div class="ps-detail-body" id="ps-detail-body"></div>
  </aside>
  {{spec_data}}
  <script>
{{markdown_libs}}
  </script>
  <script>
  (function () {
    var DATA = psReadSpecData();
    var L = DATA.labels || {};
    var cards = DATA.cards || [];
    var byId = {}; cards.forEach(function (c) { byId[c.id] = c; });
    // The facet/search engine (psFacetGroups, psDistinct, psSelfMatch, psBadge,
    // psBuildFacets) is shared via render_html._BODY_RENDER_JS; this shell owns
    // only its state shape (board has no mode) and its render callback.
    var state = { q: "", facets: { status: {}, moscow: {}, horizon: {}, persona: {}, layer: {} } };

    // Search wiring is shared via render_html._BODY_RENDER_JS (psWireSearch).
    psWireSearch(state, render, L.search);

    function cardEl(c) {
      var el = document.createElement("div");
      el.className = "ve-card ve-card--elevated card";
      el.tabIndex = 0;
      el.dataset.id = c.id;                      // dataset → DOM-escaped attribute
      var cid = document.createElement("div"); cid.className = "cid"; cid.textContent = c.id; el.appendChild(cid);
      if (c.title) { var t = document.createElement("div"); t.className = "ctitle"; t.textContent = c.title; el.appendChild(t); }
      psMetaBadges(c, el);   // shared type/status/moscow/persona badge emitter
      function open() { psOpenDetail(c.id); }
      el.addEventListener("click", open);
      el.addEventListener("keydown", function (e) { if (e.key === "Enter") open(); });
      return el;
    }

    function render() {
      var board = document.getElementById("ps-board");
      board.textContent = "";
      var visible = cards.filter(function (c) { return psSelfMatch(state, c); });
      if (!visible.length) {
        var none = document.createElement("div"); none.className = "col-empty";
        none.textContent = L.no_results || "No matching artifacts"; board.appendChild(none); return;
      }
      // Bucket the visible cards by column ONCE (O(N)) rather than re-walking the
      // full visible list per column (O(columns·N)); forEach keeps source order.
      var byCol = {};
      visible.forEach(function (c) { (byCol[c.column] = byCol[c.column] || []).push(c); });
      (DATA.columns || []).forEach(function (col) {
        var inCol = byCol[col] || [];
        var colEl = document.createElement("div"); colEl.className = "board-col";
        var h = document.createElement("h2");
        h.textContent = ((DATA.col_labels || {})[col] || col) + " (" + inCol.length + ")";
        colEl.appendChild(h);
        var body = document.createElement("div"); body.className = "col-body";
        if (!inCol.length) { var e = document.createElement("div"); e.className = "col-empty"; e.textContent = "—"; body.appendChild(e); }
        inCol.forEach(function (c) { body.appendChild(cardEl(c)); });
        colEl.appendChild(body); board.appendChild(colEl);
      });
    }

    // Detail-panel controls (psOpenDetail/psCloseDetail + Escape) ship in
    // render_html._BODY_RENDER_JS (body-view-only); register this board's
    // id->card map so psOpenDetail can resolve clicks.
    psRegisterDetail(byId);

    psBuildFacets(cards, L, state, render);
    render();
  })();
  </script>
</body>
</html>
