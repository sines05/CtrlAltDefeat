<style>
/* product-spec shared design system — ONE source for every HTML output
   (the 9 --viz views + board + explorer + export). Theme via [data-theme];
   semantic + status palette; .ve-card depth tiers; print-CSS; stagger. */
:root{
  --bg:#fbfbfa; --surface:#fff; --recessed:#f4f4f2; --text:#1f2328; --muted:#6a737d;
  --border:#e2e2df; --accent:#3b6ea5; --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --green:#1a7f37; --red:#cf222e; --amber:#9a6700; --sage:#3d7d6e; --teal:#1b6b75; --plum:#8250df;
  --green-dim:#dafbe1; --red-dim:#ffebe9; --amber-dim:#fff8c5; --sage-dim:#d8f3ec; --teal-dim:#d4f0f3; --plum-dim:#f3eafc;
}
[data-theme="dark"]{
  --bg:#0d1117; --surface:#161b22; --recessed:#1c2128; --text:#e6edf3; --muted:#8b949e;
  --border:#30363d; --accent:#6ea8fe; --shadow:0 1px 2px rgba(0,0,0,.4);
  --green:#3fb950; --red:#f85149; --amber:#d29922; --sage:#56d4bc; --teal:#39c0d0; --plum:#bc8cff;
  --green-dim:#12361f; --red-dim:#3c1618; --amber-dim:#3a2d04; --sage-dim:#0f352e; --teal-dim:#0d343a; --plum-dim:#2a1b46;
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:2rem 1.5rem;line-height:1.55;}
.ps-wrap{max-width:1100px;margin:0 auto;}
h1{font-size:1.6rem;margin:0 0 .25rem;} h2{font-size:1.2rem;margin:1.4rem 0 .5rem;} h3{font-size:1rem;margin:1rem 0 .4rem;}
a{color:var(--accent);} code,pre{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.85rem;}
pre{background:var(--recessed);padding:1rem;border-radius:6px;overflow:auto;}
.ps-meta{color:var(--muted);font-size:.85rem;margin-bottom:1.25rem;}
.ve-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;min-width:0;}
.ve-card--elevated{box-shadow:var(--shadow);}
.ve-card--recessed{background:var(--recessed);}
.ve-card--hero{border-left:4px solid var(--accent);}
.badge{display:inline-block;font-size:.72rem;padding:.1rem .5rem;border-radius:999px;border:1px solid var(--border);margin:.1rem .25rem .1rem 0;white-space:nowrap;}
.badge--status{background:var(--teal-dim);color:var(--teal);}
.badge--moscow{background:var(--plum-dim);color:var(--plum);}
.badge--persona{background:var(--sage-dim);color:var(--sage);}
.badge--type{background:var(--amber-dim);color:var(--amber);}
.ps-toggle{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:999px;width:2.2rem;height:2.2rem;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);z-index:50;}
.ps-banner{background:var(--red-dim);color:var(--red);border:1px solid var(--red);border-radius:6px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.85rem;}
.ps-fallback{white-space:pre-wrap;}
/* Slide-in detail panel — ONE definition shared by board + explorer (was
   duplicated, and explorer had diverged: it hardcoded the geometry inline and
   omitted the :first-child margin reset, so a body opening with a heading gained
   an extra top-margin only in the explorer). */
.ps-detail{position:fixed;top:0;right:0;width:min(34rem,92vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;overflow:auto;z-index:60;}
.ps-detail .close{position:absolute;top:.6rem;right:.8rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);}
.ps-detail-body :first-child{margin-top:0;}
.ps-search{width:100%;padding:.5rem .7rem;font-size:.95rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);margin-bottom:.75rem;}
.ps-facets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.ps-facets button{font-size:.78rem;padding:.2rem .6rem;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--muted);cursor:pointer;}
.ps-facets button[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent);}
.ve-card,.ps-row{animation:ps-fade .28s ease both;}
@keyframes ps-fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media print{
  .ps-toggle,.ps-search,.ps-facets,.controls,.ps-detail{display:none!important;}
  body{padding:0;background:#fff;color:#000;} .ve-card{box-shadow:none;border-color:#ccc;break-inside:avoid;}
  details{open:true;} a{color:#000;text-decoration:underline;}
}
</style>
<script>
/* Shared client helpers — defined in <head>, called after the vendored libs
   (injected later in <body>) have loaded. */
(function(){
  try{var t=localStorage.getItem("ps-theme");if(t){document.documentElement.setAttribute("data-theme",t);}}catch(e){}
})();
function psToggleTheme(){
  var cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",cur);
  try{localStorage.setItem("ps-theme",cur);}catch(e){}
  var b=document.querySelector(".ps-toggle");if(b){b.textContent=cur==="dark"?"☀":"☾";}
}
function psEscapeHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
/* NOTE: the markdown sanitize chokepoint is NOT defined here. It is
   body-view-only and ships inside the markdown-libs script block, so the 9
   legacy graph views inline NO sanitizer code (symmetric gating).
   The generic helpers below are shared by every view. */
function psReadSpecData(){
  var el=document.getElementById("ps-spec-data");
  if(!el){return {};}
  try{return JSON.parse(el.textContent);}catch(e){return {};}
}
/* The detail-panel controls (psOpenDetail/psCloseDetail + Escape) are NOT here:
   they call the sanitize chokepoint, so they ship in the body-view-only script
   block (render_html._BODY_RENDER_JS) to keep the 9 legacy graph views free of
   any sanitizer reference (symmetric gating). */
</script>
