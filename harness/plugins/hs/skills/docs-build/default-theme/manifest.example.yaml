# manifest.example.yaml — minimal manifest for default-theme standalone demo.
# Drop this next to your docs/ tree, point build.py at it, and you get a
# working showcase with only the shell (no domain design needed).
#
# asset_slots contains ONLY shell parts from default-theme/assets/.
# No domain JS (02-boundary-glossary, 03-modules-flows, 04-*, 05-sims,
# 06-dialogs, 07-data-late, 08-wire, 09-search, data-JS).
# No domain CSS (03-boundary-dialog, 04-diagrams-sims).
# No GSAP / ScrollTrigger (optional; add if you use .stat .n count-ups).

pages:
- key: hub
  vi: Tổng quan
  en: Overview
  title: "My Project"
  accent: "#38bdf8"
  source: docs/index.md   # replace with your actual index md
- key: intro
  vi: Giới thiệu
  en: Introduction
  title: "Introduction — My Project"
  accent: "#34d399"
  source: docs/intro.md   # replace with your actual md

categories:
- key: main
  vi: Nội dung
  en: Content
  pages: [intro]

asset_slots:
  # shell-only: lang-toggle, canvas#net, Three.js hero, scroll-reveal,
  # hash router, sidebar drawer, TOC.  No domain code.
  js: [01-core-shell]
  css: [01-base, 02-components, 05-layout, 06-print-a11y]
  vendor: [three.min.js]

footer_pages: [hub, intro]
