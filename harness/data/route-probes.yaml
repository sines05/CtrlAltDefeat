# route-probes.yaml — human-edited probe-set for route_bakeoff.py
#
# Each probe is a phrasing a user might type, the skill it SHOULD route to, and how
# indirect the match is. The structural validator ($0, no LLM) only checks this file
# is internally consistent against the live skill catalog — every `target` exists
# (or is the `__none__` sentinel), every `none` probe is shaped as one, and no
# `distractor` doubles as a probe target. It does NOT measure routing; real
# indirect / context-only / none-clean rates need `route_bakeoff.py --run-llm`.
#
# condition:
#   indirect      — user describes intent without naming the skill (under-trigger check)
#   context-only  — only surrounding context implies the skill (under-trigger check)
#   none          — NO skill should fire; target must be `__none__` (over-trigger guard)
#
# This is a SEED, not full coverage of all 110 skills — extend it as routing gaps
# surface. Targets validated against harness/plugins (all plugin catalogs).

probes:
  # --- core SDLC loop -------------------------------------------------------
  - target: hs:plan
    condition: indirect
    message: "I need to map out how to rebuild the auth layer before I write any code"
  - target: hs:cook
    condition: context-only
    message: "the plan is approved — start executing it phase by phase with tests"
  - target: hs:test
    condition: indirect
    message: "run the suite for what I just changed and tell me if anything is red"
  - target: hs:fix
    condition: indirect
    message: "this test is failing with a clear error, make it pass"
  - target: hs:debug
    condition: indirect
    message: "the output is wrong and I have no idea why — find the root cause first"
  - target: hs:ship
    condition: context-only
    message: "branch is done and reviewed, turn it into a PR to main"

  # --- review / quality -----------------------------------------------------
  - target: hs:code-review
    condition: indirect
    message: "look over the changes I haven't committed yet for bugs and regressions"
  - target: hs:review-pr
    condition: indirect
    message: "review pull request 482 on github including its CI and breaking changes"
  - target: hs:security-scan
    condition: indirect
    message: "check the codebase for hardcoded secrets and injection holes before release"

  # --- discovery / research -------------------------------------------------
  - target: hs:research
    condition: indirect
    message: "gather sources and verify the trade-offs before we pick a sync approach"
  - target: hs:brainstorm
    condition: indirect
    message: "let's weigh a few architectures for this feature before committing"
  - target: hs:scout
    condition: indirect
    message: "find where the gate logic lives across the repo so I can start"

  # --- git / triage / self-knowledge ---------------------------------------
  - target: hs:git
    condition: indirect
    message: "commit what I have with a proper conventional message and push"
  - target: hs:triage
    condition: context-only
    message: "a bug was reported — reproduce it, classify it, then drive it to a fix"
  - target: hs:compound
    condition: indirect
    message: "we're closing the cycle — what should the harness improve about itself next"
  - target: hs:find-skills
    condition: indirect
    message: "is there a skill for this and what exactly do I type to run it"
  - target: hs:partner
    condition: indirect
    message: "get a second full-Claude opinion from another ccs provider on this before I merge"

  # --- over-trigger guards (none-clean axis) --------------------------------
  - target: __none__
    condition: none
    message: "what's the weather in Hanoi today"
  - target: __none__
    condition: none
    message: "thanks, that's all for now"
  - target: __none__
    condition: none
    message: "can you explain what a monad is in plain terms"

# Distractors: skills plausible to MIS-fire on generic chatter. None of them may be
# a probe target (the validator flags that contradiction). They sharpen the
# none-clean axis under --run-llm.
distractors:
  - hs:journal
  - hs:retro
  - hs:mermaidjs
  - hs:excalidraw
