# partner.yaml — SSOT policy for the provider-agnostic partner lane (human-edited).
#
# Factory-safe corner: master OFF ⇒ every partner call is inert. This file is
# POLICY only — no provider list, no model/engine axis. Provider discovery is
# a separate concern (harness/scripts/partner_transport.py, partner_preflight.py);
# this loader never resolves a model tier, only a purpose → methodology-template
# KEY.
#
# Forbidden-state table (enforce point in parens):
#   allow_live:on + master:off          → normalize to off  (effective())
#   write:read_only + allow_live:on     → reject at load     (loader)

master: off              # kill-switch: off ⇒ lane inert (effective()'s runtime view)
write: read_only         # read_only | worktree_staged (write always goes to a worktree)
allow_live: off          # off | on — Layer-1 gate for --live (env-bound, restart).
                          # off ⇒ --live is refused regardless of other axes.
secret_scrub: warn       # warn only — never blocks a call

# purpose → methodology-template KEY (NOT a model tier — provider/model
# resolution is a separate concern; this loader never calls resolve_model).
purposes:
  review: review
  adversarial-review: redteam
  research: research
  critique: critique

timeouts:
  default: 180
  research: 300

retry:
  max_attempts: 2
  on_markers: [rate_limit, overloaded, deadline_exceeded]

cost_warn_usd: 0.50       # per-call warn threshold (reads total_cost_usd; never
                          # self-computed)
