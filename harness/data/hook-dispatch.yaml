# hook-dispatch.yaml — the in-process dispatch registry (config, human-edited).
#
# hook_dispatch.py reads THIS file to know which hook cores a single (event,
# matcher) command must run in-process, in what order, under what HOOK_CLASS. It
# replaces N per-hook process spawns per tool call with one.
#
# Schema:
#   groups:
#     "<Event>:<Matcher>":            # matcher optional; "<Event>" alone => matcher "*"
#       - name:   <config key>        # enabled/mode lookup (defaults to module)
#         module: <python module>     # importable from harness/hooks
#         entry:  <callable>          # takes (data); defaults to "core"
#         class:  telemetry|nudge|compliance   # the MODULE's HOOK_CLASS constant wins
#         kind:   additionalContext   # optional: a telemetry core whose return is
#                                     #   injected as additionalContext (UserPromptSubmit/
#                                     #   SessionStart only)
#
# Run order inside a group is FIXED by class (telemetry+nudge first, then
# compliance) regardless of list order; within a class, list order holds.
#
# A group listed here is WIRED to hook_dispatch.py in hooks-registration.yaml +
# .claude/settings.json (the matcher string must match EXACTLY — CC scopes by it).
# Only fully-covered groups (every former hook present as a core) live here; groups
# whose hooks still write their own terminal stdout are migrated in a later slice
# and stay individually wired until then.
#
# EXACT matcher strings mirror hooks-registration.yaml so no hook is dropped.

groups:
  # Headline: PreToolUse:Bash — 7 spawns -> 1 (the wide scout_block_guard matcher is
  # a SEPARATE per-matcher group, so this per-matcher lane is 7 gates in one process).
  "PreToolUse:Bash":
    - {name: mark_bash_start, module: mark_bash_start, entry: core, class: telemetry}
    - {name: standards_drift_nudge, module: standards_drift_nudge, entry: handle_commit, class: nudge}
    - {name: gate_stage, module: gate_stage, entry: core, class: compliance}
    - {name: bash_safety_guard, module: bash_safety_guard, entry: core, class: compliance}
    # plannotator_wrapper_guard: redirect a bare `plannotator annotate` to the wrapper
    # (which injects --gate + globs the phase dir = a real Approve button). Redirect-class,
    # so fail_open:true — a crash must never wedge the Bash lane. Same name as its Skill-lane
    # row so one toggle silences both.
    - {name: plannotator_wrapper_guard, module: plannotator_wrapper_guard, entry: bash_core, class: compliance, fail_open: true}
    - {name: secret_scan_before_ship, module: secret_scan_before_ship, entry: core, class: compliance}
    - {name: protected_ref_guard, module: protected_ref_guard, entry: core, class: compliance}
    # simplify_gate is a compliance-class heuristic that is fail-OPEN by design: its own
    # main() never blocks a ship on an internal error (it ships SOFT/warn). The dispatcher
    # bypasses that main() by calling core() directly, so fail_open:true preserves the
    # "a heuristic crash never blocks the push" posture (a returned BLOCK reason still
    # respects hook_mode). Every OTHER gate here stays fail-closed on crash.
    - {name: simplify_gate, module: simplify_gate, entry: core, class: compliance, fail_open: true}

  "PostToolUse:Write|Edit|MultiEdit":
    - {name: memory_gap_hook, module: memory_gap_hook, entry: handle_post_tool_use, class: nudge}
    - {name: decision_capture_nudge, module: decision_capture_nudge, entry: handle_post_tool_use, class: nudge}
    - {name: standards_drift_nudge, module: standards_drift_nudge, entry: handle_post_tool_use, class: nudge}
    - {name: glossary_capture_nudge, module: glossary_capture_nudge, entry: handle_post_tool_use, class: nudge}
    - {name: docs_validation_nudge, module: docs_validation_nudge, entry: handle_post_tool_use, class: nudge}
    - {name: stamp_artifact, module: stamp_artifact, entry: core, class: telemetry}
    - {name: phase_progress_writer, module: phase_progress_writer, entry: core, class: telemetry}

  "SubagentStop":
    - {name: track_subagent_outcome, module: track_subagent_outcome, entry: core, class: telemetry}
    - {name: mutation_guard, module: mutation_guard, entry: do_stop, class: nudge}

  "UserPromptExpansion":
    - {name: track_skill_invocation, module: track_skill_invocation, entry: core, class: telemetry}

  "Notification":
    - {name: notify_remote, module: notify_remote, entry: core, class: telemetry}

  "UserPromptSubmit":
    - {name: inject_prompt_context, module: inject_prompt_context, entry: core_gated, class: telemetry, kind: additionalContext}
    - {name: nudge_context_inject, module: nudge_context_inject, entry: core, class: telemetry, kind: additionalContext}
    - {name: disabled_ref_nudge, module: disabled_ref_nudge, entry: core, class: nudge}

  "PreToolUse:Write":
    - {name: descriptive_name, module: descriptive_name, entry: core, class: nudge}

  "PreToolUse:Read|NotebookRead":
    - {name: privacy_read_guard, module: privacy_read_guard, entry: core, class: compliance}

  "PreToolUse:Read|Grep|Glob":
    - {name: scout_heavy_dir_nudge, module: scout_heavy_dir_nudge, entry: core, class: nudge}

  # the wide per-matcher scout_block group — a SEPARATE matcher from PreToolUse:Bash, so
  # its overlap is why per-matcher granularity keeps Bash at 8->2 not 8->1.
  "PreToolUse:Read|Write|Edit|MultiEdit|Glob|Grep|Bash":
    - {name: scout_block_guard, module: scout_block_guard, entry: core, class: compliance}

  "PreToolUse:Write|Edit|MultiEdit":
    - {name: rule_nudge_hook, module: rule_nudge_hook, entry: core, class: nudge}
    - {name: cook_delegate_nudge, module: cook_delegate_nudge, entry: core_dispatch, class: nudge}
    - {name: write_guard, module: write_guard, entry: check, class: compliance}
    - {name: agent_rbac_guard, module: agent_rbac_guard, entry: core, class: compliance}

  "PostToolUse:Bash":
    - {name: track_script_execution, module: track_script_execution, entry: core, class: telemetry}
    - {name: bash_write_guard, module: bash_write_guard, entry: core, class: telemetry}
    - {name: manual_test_anchor, module: manual_test_anchor, entry: core, class: telemetry}

  "SessionStart":
    - {name: session_init, module: session_init, entry: core, class: telemetry}
    - {name: voice_inject, module: voice_inject, entry: core, class: telemetry, kind: additionalContext}
    - {name: glossary_pointer_inject, module: glossary_pointer_inject, entry: _build, class: telemetry, kind: additionalContext}
    - {name: inject_prompt_context, module: inject_prompt_context, entry: core_gated, class: telemetry, kind: additionalContext}
    - {name: pending_decisions_resurface, module: pending_decisions_resurface, entry: core, class: nudge, kind: additionalContext}
    - {name: setup_nudge, module: setup_nudge, entry: core, class: telemetry, kind: additionalContext}
    - {name: engine_root_inject, module: engine_root_inject, entry: core, class: nudge, kind: additionalContext}
    - {name: engine_skew_nudge, module: engine_skew_nudge, entry: core, class: nudge, kind: additionalContext}

  "SubagentStart":
    - {name: subagent_init, module: subagent_init, entry: context_text, class: telemetry, kind: additionalContext}
    - {name: mutation_guard, module: mutation_guard, entry: do_start, class: nudge}

  "Stop":
    - {name: memory_gap_hook, module: memory_gap_hook, entry: handle_stop, class: nudge}
    - {name: decision_capture_nudge, module: decision_capture_nudge, entry: handle_stop, class: nudge}
    - {name: standards_drift_nudge, module: standards_drift_nudge, entry: handle_stop, class: nudge}
    - {name: glossary_capture_nudge, module: glossary_capture_nudge, entry: handle_stop, class: nudge}
    - {name: docs_validation_nudge, module: docs_validation_nudge, entry: handle_stop, class: nudge}
    - {name: dev_override_wiring_nudge, module: dev_override_wiring_nudge, entry: handle_stop, class: nudge}
    - {name: decision_reconcile_nudge, module: decision_reconcile_nudge, entry: handle_stop, class: nudge}
    - {name: backlog_capture_nudge, module: backlog_capture_nudge, entry: core, class: nudge}
    - {name: goal_cycle_nudge, module: goal_cycle_nudge, entry: core, class: nudge}
    - {name: emit_session_summary, module: emit_session_summary, entry: core, class: telemetry}
    - {name: reinject_stop_context, module: reinject_stop_context, entry: core, class: telemetry, kind: additionalContext}
    # gemini_stop_review_gate makes a slow partner-model spawn -> longer per-hook timeout.
    - {name: gemini_stop_review_gate, module: gemini_stop_review_gate, entry: core, class: nudge, kind: additionalContext, timeout: 60}

  "PreToolUse:Agent|Task":
    - {name: explore_model_guard, module: explore_model_guard, entry: core, class: compliance, fail_open: true}

  "PreToolUse:Skill":
    - {name: track_skill_invocation, module: track_skill_invocation, entry: core, class: telemetry}
    - {name: auto_finalize_ship, module: auto_finalize_ship, entry: core, class: telemetry}
    - {name: cook_isolation_nudge, module: cook_isolation_nudge, entry: core, class: nudge}
    - {name: discover_isolation_nudge, module: discover_isolation_nudge, entry: core, class: nudge}
    - {name: stale_plan_close_nudge, module: stale_plan_close_nudge, entry: core, class: nudge}
    - {name: backlog_hygiene_nudge, module: backlog_hygiene_nudge, entry: core, class: nudge}
    - {name: disabled_skill_router, module: disabled_skill_router, entry: core, class: compliance, fail_open: true}
    # plannotator_wrapper_guard: catch a Skill(plannotator-annotate) call before the bare
    # !command runs, redirect to the wrapper. Same name + fail_open as its Bash-lane row so
    # one toggle silences both lanes and a crash never wedges the Skill lane.
    - {name: plannotator_wrapper_guard, module: plannotator_wrapper_guard, entry: skill_core, class: compliance, fail_open: true}
