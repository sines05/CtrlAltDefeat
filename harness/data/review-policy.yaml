# review-policy.yaml — shared tactical review policy (profiles + stage floor + caps).
#
# This file is OPTIONAL. When ABSENT, the loader returns a default with every
# stage floor disabled and the three built-in profiles — so a fresh install
# behaves exactly as before (non-breaking). Edits are git-visible; set knobs via
# `review_policy_config.py --set` (surgical, block-scoped) or by hand.
#
# Read by: hs:code-review / recall-mode (profile + caps), the stage-floor check
# in artifact_check.py (self-discipline tier — fail-soft, NEVER bricks a gate).

# profiles: named tactical bundles. rounds>=1; the four axes are booleans;
# effort in low|medium|high|xhigh|max; scope in diff|project; aspects is a
# rotation list for per_aspect.
profiles:
  default:
    rounds: 1
    compounding: false
    per_aspect: false
    blind_main_sub: false
    refute: false
    effort: low
    scope: diff
    aspects: [correctness]
  thorough:
    rounds: 3
    compounding: true
    per_aspect: true
    blind_main_sub: false
    refute: true
    effort: high
    scope: diff
    aspects: [security, dry, correctness, consistency]
  ship-grade:
    rounds: 3
    compounding: true
    per_aspect: true
    blind_main_sub: true
    refute: true
    effort: max
    scope: project
    aspects: [security, dry, correctness, consistency]

# stage_floor: per hard-stage opt-in floor on the stamped review-decision. Ships
# OFF for every stage. When enabled, the gate blocks a stage whose
# review-decision.effort < min_effort (or rounds_run < min_rounds). This is a
# self-discipline tier, not a real boundary — a malformed file is a NO-OP, never
# a blocked gate (the real assurance stays verdict=PASS + code_evidence).
stage_floor:
  pr:
    enabled: false
    min_effort: low
    min_rounds: 1
  merge:
    enabled: false
    min_effort: low
    min_rounds: 1
  ship:
    enabled: false
    min_effort: low
    min_rounds: 1
  deploy:
    enabled: false
    min_effort: low
    min_rounds: 1

# caps: hard ceiling on rounds x lenses to bound token cost of a multi-round run.
caps:
  max_rounds: 5
  max_lenses_per_round: 8
