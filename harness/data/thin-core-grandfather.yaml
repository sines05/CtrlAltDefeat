# Thin-core char-standard — grandfathered debt ledger.
#
# The skill/agent size standard is a char-count cap (SKILL body <=15000c, references
# <=15000c, agents <=12000c, every prose line <=400c). The entries below are already over
# the per-line cap and are grandfathered so the standard holds without forcing a bad edit:
# check_skill_structure downgrades a matching HARD finding to advisory in its default
# (repo-wide sweep) mode.
#
# NOT ignored: `check_skill_structure.py --strict` (CI runs it on CHANGED files) bypasses
# this ledger, so every entry re-teeths the moment its file is next touched. Shrink this
# list as the debt is cleared — see BACKLOG BL-189.
#
# Shape: <rule> -> [component names]. Component = skill dir name or agent file stem.
#
# reference-too-large: EMPTY — the four over-cap references (sepay/polar best-practices,
# ui-ux quick-reference, drawio style-extraction) were split at heading boundaries; every
# reference now fits the 15,000-char cap.

# A single >400-char line the reflow could not safely fold: mostly TABLE ROWS (a table cell
# cannot be prose-wrapped); the rest are bullets whose only wrap point falls inside inline
# code (folding would start a wrapped line with a bare `|`, mis-rendering) or that a test
# pins verbatim. Every genuinely reflowable prose/blockquote offender was already normalized.
overlong-line:
  - drawio        # style-presets.md 405c · troubleshooting.md 430c (table rows) · style-extraction.md 499c
  - setup         # references/gate-config.md — one 408c table row
  - ui-ux         # references/external-design-skills.md — one 410c table row
  - ai-multimodal # SKILL.md — a 735c "TIP" bullet with inline-code pipes; restructure (see FINDINGS), not mechanically foldable
  - plan          # SKILL.md — a 451c bullet embedding the canonical report-rendering pointer that test_audience_mirror_drift pins VERBATIM; restructure the pointer onto its own line to clear
