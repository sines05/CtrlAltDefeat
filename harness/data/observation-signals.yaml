# observation-signals.yaml — the CLOSED vocabulary for emit_observation.py.
#
# A skill emits one of these at its end-of-work checkpoint to record a JUDGMENT a
# deterministic hook cannot see ("the evidence I pulled was thin", "this gate blocked
# me twice"). The vocabulary is closed ON PURPOSE: emit_observation rejects any signal
# not listed here with a non-zero exit and writes nothing — a typo must fail loud, not
# silently record a bogus signal. Add a signal by adding a row here (human-edited).

signals:
  - name: thin-evidence
    description: >-
      The evidence available for a decision/plan/review was sparse — a conclusion was
      reached on weaker grounds than ideal.
  - name: red-team-reopened
    description: >-
      A red-team / adversarial pass reopened a question that was thought settled,
      forcing a revision late in the cycle.
  - name: gate-repeat-block
    description: >-
      A gate (verification / review / stage) blocked the same change more than once —
      a sign the gate or the work is fighting the flow.
  - name: trigger-near-miss
    description: >-
      A skill almost mis-routed (a near-match description) — the router nearly fired
      the wrong skill, or nearly missed the right one.
  - name: plan-revised-post-approval
    description: >-
      An approved plan had to be revised after approval — the approval gate did not
      catch a gap that surfaced during execution.
  - name: audience-plain-reask
    description: >-
      A user at audience=plain (0 or 1) re-asked for a simpler explanation after
      receiving a report — a signal that the audience prose register was not
      accessible enough. Used to measure the effectiveness of the plain audience
      profiles; counted after ship as real feedback, not a pilot proxy.
