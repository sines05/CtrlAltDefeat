# components.yaml — optional feature bundles for ship-all-but-off packaging.
#
# Every component SHIPS unconditionally (install copies all files, wires all
# hooks so `verify_install --strict` stays green). A component is turned OFF at
# RUNTIME only. Hook-bearing components (rbac, decision-capture) get `enabled:
# false` per hook in harness-hooks.yaml. The other components are GROUP LABELS
# post-collapse: every skill ships in the one `hs` plugin, so the real
# per-skill disable is dir-OMISSION at install (`install --skills`/`--skill-groups`,
# `hs-cli skills --disable`). The legacy `plugin:` key and any
# `enabledPlugins[hs-<group>@hs-local]` toggle are VESTIGIAL — that plugin no
# longer exists, so flipping it disables nothing.
#
# For hook-bearing components SKILL/SCRIPT/DATA lists are informational and the
# load-bearing effect is the HOOK flag; for the label components the `skills:`
# list is the install-time selection set.
#
# Only OPTIONAL features live here. Core always-on hooks (gate_stage, write_guard,
# session_init, ...) are deliberately NOT declared — the projector
# never touches an undeclared hook.
#
# `requires`: a component may not be enabled while a component it depends on is off.

components:
  rbac:
    hooks: [agent_rbac_guard]
    scripts: [agent_permissions, rbac_selfcheck]
    data: [agent-permissions.yaml]
    requires: []

  decision-capture:
    hooks: [nudge_context_inject, decision_capture_nudge]
    skills: [remember]
    requires: []

  uiux:
    # Group label (was the hs-uiux sibling plugin pre-collapse) (UI/UX design intelligence,
    # frontend build from designs/screenshots, web-interface-guidelines review).
    # Ported (provenance in docs/STANDARDIZE.md). "off" flips
    # enabledPlugins[hs-uiux@hs-local]=false and the skills ship under hs
    # (ship-all-but-off). Disabling omits these skills at install (per-skill dir-omit).
    skills: [web-design-guidelines, design, frontend-design, ui-ux, ui-styling, show-off]
    hooks: []
    requires: []

  viz:
    # Group label (was the hs-viz sibling plugin pre-collapse) (diagrams / knowledge graphs
    # / visual preview). No hooks — "off" omits these skills at install
    # and all skills ship under the one hs plugin. Disabling omits these skills at install (per-skill dir-omit).
    skills: [excalidraw, mermaidjs, graphify, tech-graph, preview, drawio]
    hooks: []
    requires: []

  devops:
    # Group label (was the hs-devops sibling plugin pre-collapse) (deploy / cloud devops /
    # web testing / browser automation). Ported (provenance in
    # docs/STANDARDIZE.md). "off" omits these skills at install
    # and all skills ship under the one hs plugin. Disabling omits these skills at install (per-skill dir-omit).
    skills: [deploy, devops, web-testing, agent-browser, chrome-profile]
    hooks: []
    requires: []

  ai:
    # Group label (was the hs-ai sibling plugin pre-collapse) (AI/multimodal generation,
    # media processing, creative-coding: shaders, three.js, video). Ported
    # (provenance in docs/STANDARDIZE.md). "off" flips
    # enabledPlugins[hs-ai@hs-local]=false while the plugin dir still ships
    # (ship-all-but-off). Disabling omits these skills at install (per-skill dir-omit).
    skills: [ai-multimodal, ai-artist, stitch, shader, threejs, html-video, remotion, media-processing, gemini, partner]
    hooks: []
    requires: []

  stack:
    # Group label (was the hs-stack sibling plugin pre-collapse) (full-stack engineering
    # playbooks: backend / frontend / mobile dev, databases, React, web frameworks,
    # TanStack, better-auth). Ported (provenance in
    # docs/STANDARDIZE.md). "off" omits these skills at install
    # and all skills ship under the one hs plugin. Disabling omits these skills at install (per-skill dir-omit).
    skills: [backend-development, frontend-development, mobile-development, databases, react-best-practices, web-frameworks, tanstack, better-auth]
    hooks: []
    requires: []

  integrations:
    # Group label (was the hs-integrations sibling plugin pre-collapse) (third-party
    # integrations: payments SePay/VietQR, Shopify, Google ADK, MCP usage, git
    # knowledge graph). Ported (provenance in docs/STANDARDIZE.md).
    # "off" omits these skills at install while the plugin
    # dir still ships (ship-all-but-off). Disabling omits these skills at install (per-skill dir-omit).
    skills: [payment-integration, shopify, google-adk-python, use-mcp, gkg]
    hooks: []
    requires: []

  extra:
    # Group label (was the hs-extra sibling plugin pre-collapse) (misc / content / PM
    # skills: ask, llms, watzup, copywriting, ghpm, mintlify, markdown-novel-viewer,
    # cti-expert). Ported (provenance in docs/STANDARDIZE.md).
    # "off" omits these skills at install while the plugin dir
    # still ships (ship-all-but-off). Disabling omits these skills at install (per-skill dir-omit).
    skills: [ask, llms, watzup, copywriting, ghpm, mintlify, markdown-novel-viewer, cti-expert, prompt]
    hooks: []
    requires: []

  flow:
    # Plugin-only: hs-flow (workflow/orchestration/autonomy). Core decomposition.
    skills: [vibe, loop, afk, autonomous-bell, goal, team, worktree, compound, project-management, plans-kanban, coding-agent-orchestration]
    hooks: []
    requires: []

  think:
    # Plugin-only: hs-think (reasoning/decision/critique). Core decomposition.
    skills: [brainstorm, predict, scenario, sequential-thinking, problem-solving, critique, bakeoff]
    hooks: []
    requires: []

  research:
    # Plugin-only: hs-research (investigation/discovery/scan). Core decomposition.
    skills: [research, discover, repomix, techstack, security-scan, manual-test, contract-test, eval-bootstrap]
    hooks: []
    requires: []

  create:
    # Plugin-only: hs-create (authoring harness artifacts). Core decomposition.
    skills: [skill-creator, harness-creator, mcp-builder, agentize, port, bootstrap]
    hooks: []
    requires: []

  mem:
    # Plugin-only: hs-mem (memory/reflection/docs). Core decomposition.
    skills: [remember, insights, journal, retro, docs, docs-seeker, document-skills]
    hooks: []
    requires: []

  meta:
    # Plugin-only: hs-meta (harness self-management). Core decomposition.
    skills: [find-skills, voice, context-engineering, project-organization, rule-author]
    hooks: []
    requires: []

  docs-ssot:
    # Docs-as-SSOT pipeline: scaffold → standardize (gate) → build (render).
    # _docslib is the shared lib (no SKILL.md, not listed here — see skill-deps.yaml).
    skills: [docs-scaffold, docs-standardize, docs-build]
    hooks: []
    requires: []

  product:
    # Group label (PO/BA product-spec skills: spec + shape). No hooks — "off" omits
    # these skills at install and both skills ship under the one hs plugin.
    # Disabling omits these skills at install (per-skill dir-omit).
    skills: [spec, shape]
    hooks: []
    requires: []
