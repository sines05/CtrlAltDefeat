# terminal-voice.yaml — the harness's CONVERSATIONAL register in the terminal.
#
# These knobs shape ONLY what the assistant SAYS to you in the terminal — the
# surface prose. They never touch code, generated docs/reports, commit messages,
# evidence (file:line / IDs / SHAs / quotes), or any gate's allow/block decision;
# and they do NOT control an artifact's own designed voice (the journal-writer's
# brutal candor, the hs:critique neutral tone stay fixed at every voice_level).
# The scope-fence, the harshness ladder, and the universal-harm floor live in
# harness/rules/terminal-voice.md. Loader: harness/scripts/voice_prefs.py.
#
# The audience-adaptation level that used to live here as `output_style` is now
# `code_style` in harness/data/output.yaml — it shapes the DELIVERABLE (generated
# code), a deliverable concern, not the scope-fenced terminal voice. The report/code
# register knobs (language, humanize, audience, code_style) ALL live in output.yaml;
# this file is voice-only. The two are deliberately NOT merged (disjoint fail-mode,
# override discovery, and scope-fence). One-command view of every knob across both
# files: `python3 harness/scripts/output_config.py --resolved`.
#
# A missing key, out-of-range value, or typo silently falls back to its default
# (the loader never crashes). The /hs:voice quick-switch may rewrite this file
# when you ask it to persist a choice (comments are not preserved on rewrite).

# terminal_voice_level: 0..5 (default 5) — explanation depth/format of terminal
#   answers AND interview/turn verbosity (the former `detail_level` folds in here).
#   0 = answer only, no explanation … 5 = full reasoning, context, alternatives.
action_prompting: proactive
interview_rigor: deep
no_markdown: false
persona: bluf
persona_bundle: null
terminal_voice_level: 3
voice_level: 6
