# harness-hooks.yaml — the per-hook on/off registry (nudges + opt-in gates).
#
# A hook's CLASS (telemetry | nudge | compliance) is a code constant in the hook
# file (HOOK_CLASS = "...") and CANNOT be changed here — a broken/edited config
# never reclassifies a gate.
#
# This file now lists EVERY toggleable nudge + opt-in gate EXPLICITLY (no reliance
# on class-default for them), so the on/off surface is complete and auditable.
# Still NOT listed here (controlled elsewhere):
#   - telemetry hooks  → class-default ON; kill the whole class with env HARNESS_TELEMETRY_DISABLED
#   - safety/enforcement guards (gate_stage, write_guard, agent_rbac_guard,
#     protected_ref_*, privacy_read_guard, bash_safety_guard, merge_gate, standards_strict_gate,
#     test_policy_dod) → the guard-policy plane (off/warn/block + preset + floor)
#
# Class defaults (only when a hook is listed in NEITHER plane):
#   telemetry → enabled: true, advisory   nudge → enabled: false   compliance → enabled: true, blocking
#
# TRACKED IN GIT on purpose (tamper-visible): flipping a gate leaves a diff + a gate_skip trace.
# Dev-only divergence: copy to .harness-dev/harness-hooks.yaml + point HARNESS_HOOK_CONFIG at it
# (gitignored, HARNESS_* scrubbed at push, restart to bind) — change dev without touching ship.
#
# Example: gate_stage is a guard (guard-policy), not here. An opt-in gate goes:
#   simplify_gate: {enabled: false}   # mode (warn/block) lives in simplify-policy.yaml

# Context re-injection refresh mode (top-level config, NOT a nudge toggle):
#   slim (default) -> within-window refreshes emit the compact block (token diet).
#   full           -> every refresh emits the full ~2.3K-token block (A/B baseline
#                     + instant rollback; no code revert needed).
# Read by inject_prompt_context._refresh_mode(); the first injection after a
# session boundary is ALWAYS full regardless of this knob.
