# stage-policy.yaml — stage → gate policy (human-edited config, YAML).
#
#   hard: true  → missing requirement BLOCKS (exit 2); false → advisory only.
#   requires:   → artifact kinds that must exist (and pass verdict policy)
#                 at plans/<active>/artifacts/<kind>.yaml (legacy .json read too).
#   require_plan: hard stage must resolve an active plan (default true when
#                 omitted). Set false per-stage to opt out — the change is
#                 tracked in git (tamper-visible).
#   allow_completed_plan: when no plan is in_progress, let this stage anchor the
#                 freshly-closed (completed) plan IF it is the newest on the
#                 board — so a close-then-push clears instead of blocking as
#                 no-active-plan. Default false. Only push opts in (ship/pr close
#                 after the transport, so they still want the live in_progress
#                 plan). git-tracked.
#
# Verdict policy for hard stages (in code, not here): verification must have
# no FAILed check; review-decision verdict must be exactly PASS —
# PASS_WITH_RISK is a conscious soft-accept, not a ship license.
#
# hard_stage_advisory (default true = nag on): the LOCAL advisory NAG for a hard-stage
#   receipt gap. Ship keeps it ON (downstream sees the reminder); a dev who wants a
#   quieter loop sets it false in .harness-dev/stage-policy.yaml (the gate_advisory
#   TRACE fires either way, and local never blocks — enforcement is the remote CI).
hard_stage_advisory: true
stages:
  commit:
    hard: false
    requires: []
    require_plan: false
  push:
    hard: true    # personal-first: local NEVER blocks — a receipt gap downgrades to a
                  # gate_advisory TRACE + return None (no block). hard:true here means
                  # push RUNS the requires-check + emits the trace + the [advisory] line;
                  # it does NOT mean "block". Shipped keeps hard_stage_advisory at its
                  # default (true), so downstream SEES the [advisory] nag — a dev who
                  # wants silence sets hard_stage_advisory:false in .harness-dev/. The
                  # only hard local blocks are forgery + protected-branch-destructive +
                  # secrets; presence/DoD enforcement lives in the remote CI receipts-gate.
    requires: [verification]
    allow_completed_plan: true
  pr:
    hard: true
    requires: [verification, review-decision, plan-approval]
  merge:
    hard: true
    requires: [verification, review-decision, plan-approval]
  ship:
    hard: true
    requires: [verification, review-decision, plan-approval]
  deploy:
    hard: true
    requires: [verification, review-decision, plan-approval]
