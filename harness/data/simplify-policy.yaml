# simplify-policy.yaml — posture for the ship/pr/deploy diff-simplification gate
# (harness/hooks/simplify_gate.py).
#
# AGENT-LOCKED, HUMAN-ONLY. This file is in write_guard's GUARD_LIST: an agent
# cannot edit it through Write/Edit/MultiEdit, and there is NO env override. Only
# a human editing this file by hand changes the gate's behavior.
#
# mode:
#   off   — gate inert (no signal, no block)
#   warn  — SOFT (default): advisory stderr note at the stage, never blocks
#   block — HARD: blocks the stage (exit 2) until the diff is simplified
schema_version: "1.0"
mode: warn

# Stages the gate fires at. Deliberately the human-checkpoint stages only —
# never `commit`/`push`, so autonomous commit loops are not bricked. ship is
# already a human checkpoint where a hard block is safe.
stages: [pr, ship, deploy]

# Size budget for the working diff vs HEAD. A breach of ANY one trips the gate.
thresholds:
  loc_delta: 400        # total added+removed lines (tracked) + untracked line count
  file_count: 8         # number of changed/added files
  single_file_loc: 200  # largest single-file change

# Generated / vendored paths excluded from the size signal so a legitimate
# generated-output ship never self-blocks. '**/name' also matches a root-level
# file of that name.
exclude:
  - "**/manifest.json"
  - "harness/manifest.json"
  - "*.lock"
  - "**/*.lock"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "yarn.lock"
  - "poetry.lock"
  - "Cargo.lock"
  - "go.sum"
