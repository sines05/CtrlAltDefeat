# mutation-guard.yaml — config for mutation_guard.py (nudge, fail-open, default OFF).
#
# advisory_agents: agent_type values that must NOT mutate source during a run.
#   If the agent_type matches, the guard takes a content-hash snapshot at
#   SubagentStart and diffs at SubagentStop. Any changed non-allowlisted path
#   triggers an advisory trace + stderr. This is DETECTION only — it does NOT
#   block. Agents not in this list are skipped silently.
#
# allow_paths: glob patterns (fnmatch) for paths to IGNORE in the diff.
#   Typical: generated files, caches, state dirs.

advisory_agents:
  - red-teamer
  - independent-revalidator
  - researcher
  - critique-consolidator
  - product-value-critic
  - market-fit-critic
  - brainstormer
  - code-reviewer

allow_paths:
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "harness/state/**"
  - ".coverage"
  - "**/.coverage"
  - "**/.pytest_cache/**"
  - "**/*.egg-info/**"
