# skill-defaults.yaml — the ship default-off skill catalog (SSOT).
#
# A fresh install ships ~43 skills ON and 75 OFF. OFF skills are copied into
# the stash (harness/plugins/hs/disabled-skills/ — a SHIPPED tree, unlike the
# gitignored harness/state/) so the hs:use proxy and `hs-cli skills --enable`
# reach them without the source tree. The 16-skill floor (13 spine + use +
# find-skills + cleanup) and the interview keep-list stay ON. A kept skill may
# route to an OFF one (off-as-dep is valid — reached via the hs:use door).
# Source: interview #21.
#
# `default_off` is the flat authority; `clusters` groups the same names for the
# hs:setup onboarding prompt and must partition default_off exactly.

