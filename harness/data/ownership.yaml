# ownership.yaml — zone → allowed write roots for fs_guard (script-path
# containment helper). Paths are relative to the repo root. A harness script
# that resolves its target through fs_guard.assert_under(path, zone) BEFORE
# opening the file cannot write outside its zone's root(s).
#
# This table only constrains HARNESS SCRIPTS disciplining themselves — it
# cannot stop a raw LLM Write (see fs_guard docstring for the honesty caveat).
zones:
  docs: [docs/]
  # state: declared for documentation only — no script routes its writes through
  # fs_guard.assert_under(..., "state"), so this zone is NOT enforced by
  # containment. Listing it here records the intended write root; it gives no
  # at-rest protection.
  state: [.harness/state/]
  standards: [harness/standards/]
  plans: [plans/]
