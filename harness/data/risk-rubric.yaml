# risk-rubric.yaml — derive a change-risk tier from the files a diff touches.
#
# Read by harness/scripts/risk_rubric.py (env override HARNESS_RISK_RUBRIC).
# A hard-gate match forces high_risk regardless of flag count; otherwise the
# flag count picks the tier. The tier maps to a ceremony the cook/review skills
# enforce (skill-enforced, not a hard gate — see risk_rubric.py boundary note).
#
# Universal-minimal by design: only stack-agnostic gates/flags ship here so the
# harness does not false-trigger on stacks a repo does not use (Kafka, ES,
# Flyway, Redis…). A repo adds its own gates/flags by pointing
# HARNESS_RISK_RUBRIC at an extended copy.

enabled: true

# ANY match → high_risk. Globs use **/ = any depth.
hard_gates:
  auth:                       # auth / ACL / permission / token handling
    globs:                    # word-anchored so author.py / oracle.py don't false-trigger
      - "**/auth/**"
      - "**/auth.*"           # auth.py, auth.go, auth.ts
      - "**/auth_*"           # auth_service.py
      - "**/*_auth.*"         # token_auth.py
      - "**/authn*"           # authn
      - "**/authz*"           # authz
      - "**/authentic*"       # authentication, authenticator
      - "**/authoriz*"        # authorization
      - "**/oauth*"
      - "**/login*"             # login / signin flows
      - "**/*jwt*"              # token handling
      - "**/session*"           # session management
      - "**/crypto*"            # crypto helpers
      - "**/password*"          # password reset / hashing
      - "**/security/**"
      - "**/permission*/**"
      - "**/permissions.*"
      - "**/rbac.*"
      - "**/*_rbac.*"
      - "**/acl.*"
      - "**/*_acl.*"
  migration:                  # schema migration with data-loss risk
    globs:
      - "**/migrations/**"
      - "**/migration/**"
      - "**/db/changelog/**"
      - "**/V*__*.sql"          # Flyway V<n>__<desc>.sql anywhere (flat layout)
      - "**/alembic/**"         # alembic
      - "**/versions/*.py"      # alembic revision files
      - "**/*.prisma"           # Prisma schema
  secret:                     # secret / credential handling
    globs:
      - "**/*secret*"
      - "**/*credential*"
      - "**/.env*"
  api_contract:               # public API surface / wire contract
    globs:
      - "**/api/**"
      - "**/routes*"            # routes.py, routes.go
      - "**/controllers/**"     # MVC controllers
      - "**/endpoints*"
      - "**/handlers/**"        # HTTP handlers
      - "**/*.proto"
      - "**/openapi*"
      - "**/*.graphql"
      - "**/*.gql"

# Each match adds one flag. dependency_manifest is detected via
# change_class_derivation (not listed here) to stay consistent with the
# test-policy change-class signals.
flags:
  - name: config
    globs:
      - "**/config/**"
      - "**/*.config.*"
      - "**/settings*"
  - name: ci_infra
    globs:
      - "**/.github/**"
      - "**/Dockerfile"
      - "**/docker-compose*"
  - name: schema
    globs:
      - "**/schema/**"

thresholds:
  tiny_max: 1      # 0-1 flags → tiny
  normal_max: 3    # 2-3 flags → normal; 4+ → high_risk

# tier → extra demands the cook/review skills enforce.
ceremony:
  tiny:
    require_plan: false
    require_security_scan: false
    require_non_author_review: false
  normal:
    require_plan: true
    require_security_scan: false
    require_non_author_review: false
  high_risk:
    require_plan: true
    require_security_scan: true
    require_non_author_review: true
