# code-review.yaml — hs:code-review recall-mode knobs (human-edited config).
#
# Recall-mode scales Stage-2 finding production by an effort level. It changes HOW
# findings are produced (fan-out → verify → sweep), NEVER the gate: the
# verdict-truth-table, dismissals lookup, and review-decision.json are unchanged.
#
# effort: leading arg [low|medium|high|xhigh|max]. Resolution precedence, highest
#   first: explicit arg > HARNESS_REVIEW_EFFORT env > this file > default `low`.
#   `low` == today's single code-reviewer pass (non-breaking — do not change it).
#
# Per level (the breadth knob — numbers live here, not in code):
#   fan_out : run multiple independent finder lenses (False = single pass)
#   lenses  : how many independent finder lenses to spawn
#   verify  : how confirmed findings are re-checked
#             self | consolidate | consolidate_verify | independent | independent_per_finding
#   sweep   : run one extra recall sweep after the first round (catch the tail)
#
# Orchestration (prose in references/recall-mode.md): low/medium run inline (manual
# Task spawn); high+ SHOULD orchestrate via the ultracode Workflow tool, with inline
# Task fan-out as the fallback when the ultracode opt-in is absent.

default: low

levels:
  low:
    fan_out: false
    lenses: 1
    verify: self
    sweep: false
  medium:
    fan_out: true
    lenses: 3
    verify: consolidate
    sweep: false
  high:
    fan_out: true
    lenses: 5
    verify: consolidate_verify
    sweep: true
  xhigh:
    fan_out: true
    lenses: 6
    verify: independent
    sweep: true
  max:
    fan_out: true
    lenses: 8
    verify: independent_per_finding
    sweep: true

# Deterministic scope→suggested-effort mapping (assess_scope). The skill prints the
# suggestion and cross-checks it against the resolved effort; on a mismatch it ASKS
# (AskUserQuestion) unless --auto. file-count thresholds bound the scope label.
scope:
  small_max: 2       # 0-2 changed files → small
  moderate_max: 9    # 3-9 → moderate; 10+ → large
  # suggested_effort: a risk-gate signal (auth/migration/secret/api_contract) or a
  # large diff suggests high; a moderate diff or non-gate flags suggest medium;
  # otherwise low. The mapping is reproducible (same inputs → same suggestion).
