id: STD-REVIEW-SWIFT
type: std_area
zone: operational
title: "Review — Swift"
status: approved
owner: harness
version: 1.0.0
description: |
  Swift review rules (scope **/*.swift, **/Package.swift). Safety rules around
  concurrency isolation and Keychain usage, plus advisory rules for value types,
  protocol-oriented design, and Swift Testing.
rule_groups:
  - id: STD-REVIEW-SWIFT-RG1
    title: "Safety — concurrency, secrets, force-unwrap"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-SWIFT-RG1-R1
        title: "Swift 6 strict concurrency — Sendable types and actors"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: critical
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: enable Swift 6 strict concurrency checking. Use Sendable
          value types (struct, enum) for data crossing isolation boundaries.
          Use actors for shared mutable state. Use structured concurrency
          (async let, TaskGroup) over unstructured Task {}.
          NEVER: pass a non-Sendable class instance across an async boundary
          without explicit isolation — the compiler warning is a data-race
          in waiting. Never use unstructured Task {} inside an actor or a
          @MainActor context without capturing the right isolation; a Task
          detached from its parent runs on the global executor and races
          with every other actor access.
        rationale: |
          Swift 6 strict concurrency turns data races into compile errors.
          A non-Sendable type crossing an async boundary is the Swift
          equivalent of sharing a mutable object between threads without a
          lock — the compiler can now prove it safe at build time, but only
          if strict checking is enabled. Unstructured Task {} opts out of
          structured concurrency's cancellation and priority propagation;
          the parent cannot cancel it, and it runs to completion regardless
          of whether the result is still needed.
      - id: STD-REVIEW-SWIFT-RG1-R2
        title: "Keychain for secrets — never UserDefaults"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use Keychain Services for storing tokens, passwords, API
          keys, and any credential-like data. Load build-time secrets from
          environment variables or .xcconfig files (never hardcoded in
          source).
          NEVER: write a token, password, or API key to UserDefaults — it is
          stored in an unencrypted plist file readable by any process with
          the app's sandbox and included in unencrypted device backups.
          Never hardcode a secret string literal in Swift source —
          decompilation tools extract string literals from the binary in
          seconds.
        rationale: |
          UserDefaults is backed by a plain plist on disk — no encryption,
          no access control beyond the sandbox, and included verbatim in
          iTunes/Finder backups. Keychain encrypts data at rest with the
          device's hardware key and enforces access control (biometric,
          device-passcode). A hardcoded key in a Swift file is recoverable
          with `strings` on the binary.
      - id: STD-REVIEW-SWIFT-RG1-R3
        title: "Ban force-unwrap and force-try"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use optional binding (if let / guard let), nil-coalescing
          (??), or optional chaining (?.) to handle optionals. Use do/catch
          with typed throws (Swift 6+) for error handling.
          NEVER: force-unwrap an optional with ! or force-try with try! — a
          force-unwrap that crashes in production is a code path the developer
          decided not to handle, and the crash gives the user no recourse.
          The only defensible force-unwrap is in a test where the fixture is
          known-invalid if the optional is nil and the crash IS the intended
          test failure.
        rationale: |
          ! and try! are crash-on-nil / crash-on-error — they convert a
          recoverable absence into an unrecoverable crash. guard let with a
          clear error message, or throws with a typed error, gives the caller
          a choice. The Swift compiler's optional system exists to make
          absence explicit; ! undoes that guarantee.
  - id: STD-REVIEW-SWIFT-RG2
    title: "Idioms — value types, protocol-oriented design"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-SWIFT-RG2-R1
        title: "Struct by default, class only for identity"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use struct with value semantics by default — let over var
          for all properties that do not need mutation. Use class only when
          identity (===), reference semantics, or shared mutable state
          (actor) is required. Use enums with associated values to model
          distinct states instead of a struct with a status field and
          optional payloads.
          NEVER: use class for a data-transfer object that carries no
          identity — a class DTO is passed by reference, so any consumer that
          mutates it silently changes the value for every other holder. Never
          model a state machine with a mutable status enum on a struct; use an
          enum with associated values so invalid state combinations are
          unrepresentable.
        rationale: |
          Structs are copied on assignment — no shared mutable state, no
          action at a distance. Classes are shared by reference — a mutation
          in one place changes the object everywhere it is held. Using the
          right one turns a class of bugs into compiler errors. Modeling
          states as an enum with associated values (LoadState.loaded(T)
          vs .failed(Error)) makes it impossible to have a "loaded" state
          with no data or a "failed" state with no error.
      - id: STD-REVIEW-SWIFT-RG2-R2
        title: "Protocol-oriented design — small protocols, default implementations"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: define small, focused protocols (1-3 requirements). Use
          protocol extensions for shared default implementations. Inject
          protocols via constructor with a default parameter so production
          code uses the default and tests inject mocks.
          NEVER: create a "god protocol" that bundles 10+ requirements — a
          single concrete type must satisfy all of them, and a test mock must
          stub every one even when the test uses only two. Never use a class
          where a protocol + struct would serve; the protocol defines the
          contract and the struct carries the data.
        rationale: |
          Small protocols follow the Interface Segregation Principle:
          consumers depend only on what they use, and test doubles implement
          only the methods the test needs. Protocol extensions let you add
          functionality to every conforming type without touching each one.
          A 10-method protocol forces every implementor (including test
          doubles) to carry dead weight.
  - id: STD-REVIEW-SWIFT-RG3
    title: "Testing — Swift Testing framework"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-SWIFT-RG3-R1
        title: "Swift Testing over XCTest for new tests"
        status: approved
        scope: ["**/*.swift", "**/Package.swift"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: use Swift Testing (import Testing) with @Test and #expect
          for new tests. Use parameterized tests (@Test with arguments) for
          testing the same behaviour across multiple inputs. Set up in init
          and tear down in deinit — each test gets a fresh instance.
          NEVER: mix XCTest and Swift Testing in the same test target without
          a migration plan — the two frameworks have different lifecycles and
          assertion semantics, and a test that passes in one may fail in the
          other due to isolation differences. Never share mutable state
          between tests via static or global variables.
        rationale: |
          Swift Testing is the successor framework with concise syntax
          (#expect over XCTAssert), built-in parameterization, and clearer
          failure messages. XCTest tests continue to work, but new code
          should adopt the current framework. Parameterized tests replace
          copied test bodies with slight input variations — one test
          function, many inputs, one place to fix when the behaviour changes.
