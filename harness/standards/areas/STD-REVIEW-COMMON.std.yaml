id: STD-REVIEW-COMMON
type: std_area
zone: operational
title: "Review — common (cross-cutting)"
status: approved
owner: harness
version: 1.0.0
description: |
  Cross-cutting review rules that apply to all code regardless of language.
rule_groups:
  - id: STD-REVIEW-COMMON-RG1
    title: "Cross-cutting principles, security, observability, testing"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-COMMON-RG1-R1
        title: "Development principles (YAGNI / KISS / DRY)"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: build only what's needed now; readable over clever; extract
          shared logic to a single source of truth.
          NEVER: speculative features, premature optimization, copy-paste code.
          PREFER: explicit duplication over the wrong abstraction (3 similar
          lines over a premature abstraction).
          REJECT review findings that pattern-match without verifying defaults,
          suggest frontend security for a backend-validated op, claim valid
          modern syntax is invalid, add overhead to a hot path, or extract
          trivial one-call-site code.
        rationale: |
          Before implementing any finding, check defaults, the framework, the
          performance-sensitivity of the path, and whether a second
          implementation will ever exist. A finding that fails these is noise.
      - id: STD-REVIEW-COMMON-RG1-R2
        title: "Security (secrets, input, authz, fail-closed)"
        status: approved
        scope: ["**/*"]
        severity: critical
        relates_to_std: []
        detector: null
        description: |
          NEVER: commit/hardcode/log secrets, tokens, or PII; trust client-side
          validation as security; build SQL/shell from user input; rely on
          frontend-only auth; default to public access (blacklist).
          ALWAYS: keep secrets in a secret manager / gitignored .env behind a
          wrapper type; validate untrusted input at the boundary with
          parameterized queries / allowlists; validate tokens every request and
          check permissions at the service layer (least privilege); an
          unknown route defaults to auth-required (whitelist public routes);
          run a dependency audit and block a PR carrying a critical vuln.
        rationale: |
          Secrets, injection, and broken authz are durable, exploitable
          failures — a violation here BLOCKS, it is not a style nit. Logs are
          aggregated and retained; one logged token is a lasting leak.
      - id: STD-REVIEW-COMMON-RG1-R3
        title: "Observability (structured logging, levels, hot paths, metrics)"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          Applies to long-running service/library code (a CLI/script/test that
          writes to stdout by design is NOT a violation).
          ALWAYS: use the project logger with bound/parameterized context and a
          [TAG] prefix; pick the right level (DEBUG/INFO/WARNING/ERROR).
          NEVER: emit operational logs via print(); build log messages with
          f-strings/concatenation; use the root logger; log PII/secrets; log
          per-iteration in a loop or on a health check; use high-cardinality
          metric labels (user_id, request_id).
        rationale: |
          Per-iteration logging multiplies into thousands of lines per request
          and drowns signal; high-cardinality labels explode the metric series.
      - id: STD-REVIEW-COMMON-RG1-R4
        title: "Testing (pyramid, naming, determinism, mock patching)"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: name a test for what it asserts
          (test_<what>_<condition>_<expected>); reset module-level singletons /
          shared state before AND after a test; use fixtures/factories scoped
          appropriately; patch a name where it is LOOKED UP, not where defined.
          NEVER: real HTTP/DB in a unit test; depend on random/time without
          control; assert on private implementation details; guess a mock path
          (verify the import style in the source first).
        rationale: |
          Typical targets: unit (most, <1s), integration (some, <10s), e2e
          (few, <60s). Determinism and correct patch targets are what make a
          test trustworthy rather than flaky.
      - id: STD-REVIEW-COMMON-RG1-R5
        title: "Code review structural thresholds"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: keep a function under 50 lines (extract helpers), a file
          under 800 lines (split by concern), and nesting under 4 levels
          (use early returns/guard clauses to flatten).
          NEVER: merge a function that exceeds 100 lines or a file past 1200
          lines into main without a structural refactor — those are hard
          ceilings, not targets. A deeply-nested if/for/if/for at level 5+
          is always a candidate for extraction.
          These are reviewer guidelines, not linter rules — apply judgment:
          a 55-line function whose natural boundary creates worse coupling
          is fine; a 700-line file that is one cohesive module is fine.
        rationale: |
          ECC code-review thresholds set func ≤50, file ≤800, nesting ≤4 as
          soft limits with hard ceilings at 100/1200. The key is that the
          reviewer flags the outlier and the author justifies it — not that
          every file is mechanically split.
      - id: STD-REVIEW-COMMON-RG1-R6
        title: "Error handling explicitness"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: handle errors explicitly at every fallible call site —
          propagate the error (with context), handle it (with a typed
          alternative), or short-circuit (with a guard). At the outermost
          boundary (CLI entry, HTTP handler, async worker main loop),
          translate the error into a user-facing message before surfacing
          it, and log the full diagnostic server-side.
          NEVER: silently swallow an error (except: pass in Python, empty
          catch {} in Go/JS, discard(_) in Rust); return a sentinel value
          (null/None/-1) from a fallible function without documentation
          stating that the sentinel IS expected and handled by every caller.
          PREFER: fail loud at the boundary — a crashed request with a full
          trace is debuggable; a silently degraded request corrupts data
          and nobody notices.
        rationale: |
          Silent error swallowing is the #1 source of data-corruption bugs
          across all languages — a caught exception or discarded error code
          turns a visible crash into invisible wrong output. The "sentinel
          contract" exemption exists for well-known patterns (Option::None,
          dict.get returning None in Python) where callers are required to
          check; it does not extend to ad-hoc -1/null returns.
  - id: STD-REVIEW-COMMON-RG2
    title: "Code discipline (correctness, safety, testing)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-COMMON-RG2-R1
        title: "Case-insensitive, trimmed compare for enum / secret / role"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: normalize before comparing a closed-vocabulary token (enum
          value, role name, header, scheme): trim whitespace and casefold both
          sides (or compare a canonical form). Compare secrets/tokens with a
          constant-time equality, never a normalized one.
          NEVER: gate behaviour on a raw `==` against a literal when the input
          can arrive with different case or surrounding whitespace; this is how
          "Admin" bypasses an "admin" check and how a trailing newline defeats a
          token match.
        rationale: |
          Case/whitespace skew at a trust boundary is a correctness AND a
          security failure — it silently grants or denies. Secrets are the one
          exception: normalize the role, NOT the secret (use constant-time).
      - id: STD-REVIEW-COMMON-RG2-R2
        title: "Enum / closed-vocabulary fields fail closed"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: when a value must be one of a known set, reject the unknown
          explicitly (raise / error / deny) and map it to the SAFE default
          (least privilege, most restrictive).
          NEVER: let an unrecognized enum/status/role fall through a chain of
          `if`/`elif` into the permissive branch or a silent no-op; an unknown
          value is an error, not "treat as allowed".
        rationale: |
          A silently-passed unknown value is the classic fail-open bug: a new
          or malformed input is treated as the most permissive case. Failing
          closed turns an unexpected value into a visible, safe refusal.
      - id: STD-REVIEW-COMMON-RG2-R3
        title: "Path / glob traversal guard"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: when building a filesystem path or glob from a name/segment,
          reject `..` and absolute segments, and resolve+confirm the result
          stays inside the intended root before use.
          NEVER: join untrusted input into a path without a containment check;
          accept a `/`-free wildcard pattern that silently spans the whole tree
          when a single segment was intended.
        rationale: |
          Path traversal (`../../etc`) and over-broad globs read or write
          outside the intended zone — a containment check at the boundary is
          the durable fix, not downstream sanitising.
      - id: STD-REVIEW-COMMON-RG2-R4
        title: "Red->green TDD (test first, paired commit)"
        status: approved
        scope: ["**/*"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: write the test first and watch it FAIL for the intended
          reason, then implement until it passes, then commit the test+code as
          a pair.
          NEVER: add an implementation with no test, or a test written after
          the fact that has never been seen to fail (a test that cannot fail
          proves nothing).
        rationale: |
          A test seen failing first is the only evidence it actually exercises
          the new behaviour; the paired commit keeps the proof attached to the
          change it guards.
