id: STD-REVIEW-PERL
type: std_area
zone: operational
title: "Review — Perl"
status: approved
owner: harness
version: 1.0.0
thin_source: true
description: |
  Perl review rules (scope **/*.pl, **/*.pm, **/*.t, **/*.psgi, **/*.cgi).
  ECC Perl source is structurally thin — only a handful of language-specific
  rules beyond what COMMON already covers.
rule_groups:
  - id: STD-REVIEW-PERL-RG1
    title: "Perl safety — taint mode, execution, SQL"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PERL-RG1-R1
        title: "Perl — three-arg open, list-form system, DBI placeholders"
        status: approved
        scope: ["**/*.pl", "**/*.pm", "**/*.t", "**/*.psgi", "**/*.cgi"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use three-arg open with autodie
          (open my $fh, '<', $path or die $!), never two-arg open
          (open my $fh, ">$file") which treats the mode + filename as a
          single expression. Use the list form of system() —
          system('grep', '-r', $pattern, $dir) — never the string form
          system("grep -r $pattern $dir") which invokes a shell. Always use
          DBI placeholders (? or $1 in ->prepare) — never interpolate
          variables into SQL strings.
          NEVER: two-arg open, single-string system(), or SQL string
          interpolation. For CGI-facing scripts, enable taint mode with -T
          and sanitize %ENV before calling any external command.
        rationale: |
          Two-arg open interprets filename as "modearm(filename)" — a
          user-supplied filename starting with '>' becomes a truncate
          write. Single-string system() runs through the shell, which
          interprets metacharacters in the argument. SQL interpolation is
          the canonical injection vector. Taint mode prevents the most
          common shell-injection class in CGI Perl code. These three are
          Perl's most durable safety footguns — a reviewer familiar with
          modern Perl catches them immediately, but they are not caught
          by COMMON's language-agnostic injection rules.
