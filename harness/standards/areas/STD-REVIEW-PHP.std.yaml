id: STD-REVIEW-PHP
type: std_area
zone: operational
title: "Review — PHP"
status: approved
owner: harness
version: 1.0.0
description: |
  PHP review rules (scope **/*.php, **/composer.json, **/composer.lock,
  **/phpunit.xml, **/phpunit.xml.dist). Safety rules around SQL injection,
  auth safety, and secret management, plus advisory rules for strict types and
  DTO usage.
rule_groups:
  - id: STD-REVIEW-PHP-RG1
    title: "Safety — SQL, auth, secrets"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PHP-RG1-R1
        title: "Parameterized queries — never concatenate SQL from user input"
        status: approved
        scope: ["**/*.php"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use prepared statements (PDO, Doctrine query builder,
          Eloquent query builder) for every dynamic query. Scope ORM mass-
          assignment with fillable/guarded allowlists.
          NEVER: build SQL strings by concatenating request values, cookie
          values, header values, or uploaded file metadata in a controller,
          view, or service — one interpolated WHERE clause is a full
          injection vector regardless of the ORM wrapping it. Never use
          mass-assignment without an explicit allowlist of writable fields.
        rationale: |
          PHP's database layers all support prepared statements — PDO,
          Doctrine, and Eloquent each have a parameterized path. String
          concatenation in SQL bypasses every one of those guards at the
          same layer where the query is executed. Mass-assignment without an
          allowlist lets an attacker set is_admin=true by adding a field
          to a request payload.
      - id: STD-REVIEW-PHP-RG1-R2
        title: "Auth safety — password_hash, session rotation, CSRF"
        status: approved
        scope: ["**/*.php"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use password_hash() / password_verify() for password
          storage — never a custom hash or a bare md5/sha1. Regenerate session
          identifiers after authentication and privilege changes. Enforce CSRF
          protection on every state-changing web request.
          NEVER: store a plaintext password or a reversible encryption of one
          — a database backup that leaks plaintext passwords is an
          unrecoverable breach for every user in the table. Never accept a
          state-changing POST/PUT/DELETE without a valid CSRF token.
        rationale: |
          password_hash() uses bcrypt (or argon2) with a per-password salt
          and a tuneable cost factor — it is the one correct answer for PHP
          password storage, and every alternative (md5, sha1, custom hash) is
          wrong. Session fixation lets an attacker set a victim's session ID
          before authentication; regenerating the ID after login defeats this.
      - id: STD-REVIEW-PHP-RG1-R3
        title: "Secrets from env, never from committed config"
        status: approved
        scope: ["**/*.php", "**/composer.json"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: load secrets (API keys, database passwords, signing keys)
          from environment variables or a secret manager. Run composer audit
          in CI and pin major dependency versions deliberately.
          NEVER: commit a real credential to a config file, .env.example that
          is checked in, or a PHP constant — git history is forever, and a
          committed key survives every "I removed it in the next commit" fix.
          Never leave an abandoned or unmaintained package in composer.json
          without a removal plan; composer audit flags known vulnerabilities
          but only if it runs.
        rationale: |
          A committed secret is a leaked secret the moment the repo is cloned
          by anyone outside the trusted set — and `git log` makes it
          retrievable forever. Environment variables keep secrets out of the
          repo entirely. composer audit checks the project's dependency tree
          against a vulnerability database; skipping it means shipping with
          known-vulnerable packages.
  - id: STD-REVIEW-PHP-RG2
    title: "Idioms — strict types, DTOs, error handling"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PHP-RG2-R1
        title: "declare(strict_types=1) and typed properties"
        status: approved
        scope: ["**/*.php"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use declare(strict_types=1) in application code. Use scalar
          type hints, return types, and typed properties everywhere new code
          permits. Use readonly properties or immutable constructors for
          request/response payloads.
          NEVER: rely on PHP's default coercive type juggling at a service
          boundary — a function that accepts an int but receives the string
          "5 apples" silently becomes 5, and the caller never knows the data
          was partially discarded. Without strict_types, the type hint is a
          suggestion; with it, passing the wrong type is a TypeError.
        rationale: |
          PHP's default type coercion turns "5 apples" into 5, null into 0,
          and "false" into true — every one of these is a silent data-loss
          bug. strict_types=1 makes type mismatches a hard error at the call
          site, not a silent conversion deep in the stack. Typed properties
          and return types make the contract machine-checkable instead of
          docblock-checkable.
      - id: STD-REVIEW-PHP-RG2-R2
        title: "Throw exceptions — never return false/null as error channel"
        status: approved
        scope: ["**/*.php"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R6]
        detector: null
        description: |
          ALWAYS: throw a specific exception for error conditions. Convert
          framework/request input into validated DTOs before it reaches
          domain logic — the domain should never see a raw request array.
          NEVER: return false or null from a function to signal an error —
          the caller must remember to check the return value, and nothing
          forces them to. A function that returns User|false requires every
          caller to write an if-check, and one missed check silently
          propagates a boolean into code expecting a User.
        rationale: |
          PHP's legacy error convention (return false on failure) puts the
          burden on the caller — the language provides exceptions exactly for
          this. An uncaught exception stops execution with a stack trace; an
          unchecked false return continues with a garbage value that may
          persist to the database. DTOs at the boundary decouple domain logic
          from the HTTP layer — the domain operates on typed objects, not
          on $_POST arrays.
  - id: STD-REVIEW-PHP-RG3
    title: "Testing — framework, coverage, organization"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PHP-RG3-R1
        title: "PHPUnit or Pest — one framework per project"
        status: approved
        scope: ["**/*.php", "**/phpunit.xml", "**/phpunit.xml.dist"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: use PHPUnit as the default framework; use Pest if it is
          already configured and the team has adopted it. Do not mix the two
          frameworks in the same project. Separate fast unit tests from
          framework/database integration tests. Keep coverage thresholds in
          CI (phpunit --coverage-text, pest --coverage) and prefer pcov or
          Xdebug for coverage collection.
          NEVER: mix PHPUnit and Pest test files under the same test directory
          without a migration plan — the two have different lifecycle hooks,
          assertion APIs, and configuration files, and a mixed suite is
          untrustworthy. Never use large hand-written arrays as fixtures when
          factory/builders exist.
        rationale: |
          Pest is a wrapper over PHPUnit — it generates PHPUnit test classes
          at runtime. Mixing them means two test runners, two configuration
          files, and two assertion styles in the same codebase. Factories
          (Laravel's model factories, or dedicated factory classes) centralize
          test-data construction — one place to update when the model changes,
          versus scattered hand-written arrays.
