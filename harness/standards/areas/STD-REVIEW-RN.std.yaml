id: STD-REVIEW-RN
type: std_area
zone: operational
title: "Review — React Native (Expo)"
status: approved
owner: harness
version: 1.0.0
description: |
  React Native / Expo review rules (scope **/*.ts, **/*.tsx). Block-worthy
  rules around bundle-public secrets and deep-link validation, plus advisory
  patterns for performance (lists, animations, New Architecture),
  accessibility, and production readiness.
rule_groups:
  - id: STD-REVIEW-RN-RG1
    title: "Safety — bundle secrets, secure storage, deep links, permissions"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-RN-RG1-R1
        title: "Never ship real secrets in the JS bundle or app.config"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: treat everything in the JS bundle as readable by an
          attacker — a mobile binary can be unpacked. Keep privileged
          operations behind your own server or edge functions. Store auth
          tokens in expo-secure-store (Keychain/Keystore), never in
          AsyncStorage or plain MMKV.
          NEVER: ship real secrets (private API keys, service-role keys,
          signing secrets) in the JS bundle, app.config.ts, or any file
          that ends up in the built app. Public/anon keys (Supabase anon
          key, Firebase config) are acceptable ONLY when protected by
          server-side rules (RLS, security rules). A secret in the bundle
          is a secret published to every app store.
          NEVER: persist secrets or auth tokens in Redux/Zustand state
          that may be serialized to disk.
        rationale: |
          A React Native bundle is a plain JS file inside an APK/IPA.
          Anyone can extract it with standard unzip tools. Server-side
          enforcement is the only durable authorization boundary — the
          app is an untrusted client. expo-secure-store uses the OS-level
          Keychain (iOS) and Keystore (Android), which are hardware-backed
          and never exposed to the JS runtime in plain text.
      - id: STD-REVIEW-RN-RG1-R2
        title: "Validate deep-link and push-notification payloads before routing"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: validate deep-link and universal-link parameters with a
          schema (Zod) before routing or granting access. Validate push
          notification payloads before processing. Use safeParse, not
          parse — a malformed deep link should redirect to a safe
          fallback, not crash the screen.
          NEVER: pass unvalidated deep-link params directly to navigation
          (router.push, navigation.navigate) — an attacker-crafted link
          can navigate to any screen, including admin or debug routes.
          NEVER: trust deep-link params to gate access without server-side
          authorization.
        rationale: |
          Deep links and push notifications are external input from
          outside the app sandbox. A crafted link can target internal
          routes the developer assumed were only reachable from in-app
          navigation. safeParse instead of parse prevents a malformed link
          from throwing an unhandled exception during render — it
          degrades gracefully to a fallback screen.
  - id: STD-REVIEW-RN-RG2
    title: "Performance — lists, animations, images, New Architecture"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-RN-RG2-R1
        title: "Use FlatList/FlashList; never .map() large arrays in ScrollView"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use FlatList or SectionList for any scrollable list of
          more than a handful of items. For large or heterogeneous lists,
          use FlashList (Shopify) with estimatedItemSize. Provide a stable
          keyExtractor, memoize renderItem, and set getItemLayout when
          item heights are predictable.
          NEVER: render a large data set with .map() inside a ScrollView —
          ScrollView mounts every child immediately, consuming memory
          proportional to the full data set. A list of 1000 items mapped
          inside ScrollView allocates 1000 component instances; FlatList
          recycles ~10 view containers.
        rationale: |
          Virtualization is the difference between a 60fps scroll and an
          out-of-memory crash on a low-end device. ScrollView has no
          virtualization — every item is mounted and laid out. FlatList
          recycles a small pool of item containers, mounting only what is
          visible plus a small buffer. FlashList goes further with
          recycled row pools and blank-area estimation.
      - id: STD-REVIEW-RN-RG2-R2
        title: "Prefer react-native-reanimated; avoid JS-thread animation"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: info
        relates_to_std: [STD-REVIEW-RN-RG2-R1]
        detector: null
        description: |
          ALWAYS: use react-native-reanimated for animations — it runs on
          the UI thread and stays at 60fps even when the JS thread is busy.
          For legacy Animated API, set useNativeDriver: true where supported.
          NEVER: animate layout-bound properties (width, height, padding,
          margin) frequently — these trigger layout recalculation on every
          frame. Prefer transform (translate, scale, rotate) and opacity
          for performant animation.
        rationale: |
          The JS-driven Animated API sends animation values across the
          JS-Native bridge on every frame. If the JS thread is blocked
          (network response parsing, state update, render), the animation
          stutters. Reanimated runs on the UI thread with worklets —
          JavaScript functions that execute directly on the native side
          with no bridge crossing. Layout animations are expensive because
          they trigger Yoga layout recalculation for the entire subtree.
      - id: STD-REVIEW-RN-RG2-R3
        title: "Ship on New Architecture; verify native deps compatibility"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: build on the New Architecture (Fabric + TurboModules).
          It is the default in recent Expo SDKs and mandatory (cannot be
          disabled) from SDK 55+. Verify every native dependency is
          New-Arch compatible before shipping. Ensure Hermes is enabled
          (default in modern Expo) for faster startup and lower memory.
          NEVER: ship a production build with the old architecture when
          the Expo SDK version supports New Architecture — the old bridge
          has higher overhead per native call and blocks synchronous
          layout.
        rationale: |
          The New Architecture replaces the async bridge with JSI (JS
          Interface) — synchronous native calls with zero serialization
          overhead. Fabric renders on the UI thread without blocking JS.
          The migration is forced by SDK 55+; a dependency that does not
          support Fabric blocks the entire upgrade.
  - id: STD-REVIEW-RN-RG3
    title: "Accessibility — labeling, touch targets, screen readers"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-RN-RG3-R1
        title: "Every interactive element must have accessibilityRole and label"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: assign an accessibilityRole and accessibilityLabel to
          every interactive element (Pressable, TouchableOpacity, Button).
          Icon-only buttons MUST have an accessibilityLabel — there is no
          visible text for the screen reader to announce. Communicate
          state with accessibilityState (disabled, selected, checked,
          expanded).
          NEVER: ship an interactive element without a label that a
          screen reader (VoiceOver on iOS, TalkBack on Android) can
          announce. An icon button with no label is completely invisible
          to a screen-reader user — they cannot activate it because they
          do not know it exists.
        rationale: |
          Screen readers traverse the accessibility tree, not the visual
          tree. An element without accessibilityRole and accessibilityLabel
          is either skipped entirely or announced as "unlabeled button" —
          both are failures. accessibilityState communicates toggle state
          without requiring the user to activate the element first.
      - id: STD-REVIEW-RN-RG3-R2
        title: "Meet minimum touch targets; honor reduced motion and font scaling"
        status: approved
        scope:
          - "**/*.ts"
          - "**/*.tsx"
        severity: info
        relates_to_std: [STD-REVIEW-RN-RG3-R1]
        detector: null
        description: |
          ALWAYS: ensure touch targets are at least 44x44pt (iOS) /
          48x48dp (Android). Use hitSlop to enlarge small controls.
          Honor Dynamic Type / font scaling — avoid fixed heights that
          clip scaled text; test at the largest accessibility font size.
          Honor prefers-reduced-motion via
          AccessibilityInfo.isReduceMotionEnabled() — gate non-essential
          animation.
          NEVER: convey meaning by color alone — pair color with text,
          icon, or shape. Meet WCAG AA contrast: 4.5:1 for body text,
          3:1 for large text and meaningful UI elements. Verify both
          light and dark themes.
        rationale: |
          A 30x30pt touch target is physically tappable but fails
          accessibility guidelines — users with motor impairments need
          larger targets. Fixed-height containers clip text at large font
          sizes, making content unreadable. Reduced-motion is an OS-level
          accessibility setting; ignoring it causes vestibular discomfort
          for users who have explicitly opted out of animation.
