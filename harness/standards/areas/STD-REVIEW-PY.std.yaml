id: STD-REVIEW-PY
type: std_area
zone: operational
title: "Review — Python"
status: approved
owner: harness
version: 1.0.0
description: |
  Python review rules (scope **/*.py). Typing, safety, IO, patterns, and testing
  discipline enriched from ECC.
rule_groups:
  - id: STD-REVIEW-PY-RG1
    title: "Python typing, config, exceptions, async, models"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PY-RG1-R1
        title: "Python"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector:
          type: grep
          pattern: '^\s*except\s*:'
          flags: ""
        description: |
          ALWAYS: type every parameter and return (from __future__ import
          annotations); inherit a project base error with a code, chain with
          raise ... from e; async for I/O, offload blocking work with
          asyncio.to_thread; default_factory for mutable defaults,
          Field(description=...), @field_validator, StrEnum/IntEnum.
          PREFER: X | None over Optional[X]; a single settings object over
          scattered os.environ.get reads.
          NEVER: bare Any where a concrete type is known; a hardcoded
          credential or a mutable default argument (tags: list = []); a silent
          swallow (except: pass) or an f-string in a log call; time.sleep() or
          asyncio.get_event_loop() in async code; exposing get_secret_value().
          Naming: Classes PascalCase, functions snake_case, constants
          UPPER_SNAKE, private _underscore.
        rationale: |
          An except Exception that re-raises or handles at a top-level boundary
          (CLI / task runner) is legitimate; returning None for a genuine
          "not found" is idiomatic — only flag None that hides a real failure.
          The grep detector flags the bare `except:` swallow; control-flow
          swallows are not grep-detectable and a reviewer applies the full rule.
  - id: STD-REVIEW-PY-RG2
    title: "Python IO and data safety (atomic write, JSONL records)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PY-RG2-R1
        title: "Atomic write for a critical / shared file (tmp + os.replace)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: when overwriting a file other readers/processes depend on
          (a gate artifact, a manifest, a state file), write to a temp file in
          the same directory and os.replace() it into place — the rename is
          atomic, so a reader never sees a half-written file.
          NEVER: truncate-and-write a critical file in place (open("w") then a
          slow write); a crash or a concurrent read mid-write leaves it
          corrupt or empty.
        rationale: |
          os.replace is atomic within a filesystem; the temp+rename pattern is
          the standard way to make a multi-byte write all-or-nothing. A plain
          in-place write has a visible window of a torn file.
      - id: STD-REVIEW-PY-RG2-R2
        title: "JSONL record guard (each line is an object, fail loud)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: when reading JSONL, validate each parsed line is the expected
          shape (isinstance dict for an object record) before using it, and skip
          or error LOUDLY on a malformed line.
          NEVER: assume json.loads(line) returned a dict and index it directly;
          a stray string/number/null line then raises deep in consumer code or
          silently corrupts an aggregate.
        rationale: |
          Append-only JSONL stores accrete lines from many writers over time;
          one malformed line should be a visible, contained skip — not a
          TypeError three layers down or a poisoned reduction.
  - id: STD-REVIEW-PY-RG3
    title: "Python safety and correctness (advisory)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PY-RG3-R1
        title: "Python — context manager for resources (advisory)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use a with block to manage any resource that requires
          cleanup — files, locks (threading.Lock), database connections,
          network sockets, temporary directories. The with statement
          guarantees cleanup on both normal exit and exception.
          NEVER: rely on manual .close() in a try/finally or, worse, on
          __del__ to release a resource — a missed close in an exception
          path leaks the resource; __del__ runs at an unpredictable time
          (or never, during interpreter shutdown) and may find the resource
          already collected.
        rationale: |
          A linter (pylint/ruff) can catch a bare open() without a with block
          for the built-in file type. It cannot catch a custom resource class
          whose __enter__/__exit__ implementation is correct but whose call
          site omits the with statement. The reviewer sees the missing with
          and flags the leak path.
      - id: STD-REVIEW-PY-RG3-R2
        title: "Python — frozen dataclass for value types (advisory)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use frozen=True on a @dataclass that represents a value
          (an identity determined by its fields, not its mutable state) —
          this makes it hashable, safe as a dict key or set member, and
          safe to share across threads without copying.
          NEVER: use a mutable (non-frozen) dataclass as a dict key or in a
          set — the hash is computed at insertion from the current field
          values; if a field is later mutated, the object is at the wrong
          hash bucket and lookup silently returns the wrong result or misses
          entirely.
          PREFER: a NamedTuple or frozen dataclass for any type that will be
          stored in a collection keyed by its value.
        rationale: |
          A linter sees a valid @dataclass decorator. It does not trace that
          instances of this class are later used as dict keys — the mutation
          and the collection insertion may be in different files. Only the
          reviewer can connect the definition to the usage and flag the
          hash-consistency risk.
  - id: STD-REVIEW-PY-RG4
    title: "Python patterns and testing (advisory)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-PY-RG4-R1
        title: "Python — Protocol over ABC (advisory)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use typing.Protocol for structural subtyping when callers
          only need a subset of methods from a dependency — a Protocol
          declares the shape the caller needs; any object with matching
          methods satisfies it without explicit inheritance.
          NEVER: force an ABC hierarchy (abstract base class with
          @abstractmethod) when callers only consume 2 of 10 declared
          methods — every implementor must then subclass and stub 8 methods
          it does not need, and the hierarchy prevents reuse by unrelated
          types that happen to satisfy the needed subset.
          PREFER: Protocol at the call site (define it in the consuming
          module) so the contract is visible where it is needed.
        rationale: |
          A linter cannot distinguish a genuine is-a hierarchy (where ABC
          inheritance is correct) from a structural need (where Protocol is
          correct). The reviewer sees a 10-method ABC and a caller using 2,
          and flags the unnecessary coupling.
      - id: STD-REVIEW-PY-RG4-R2
        title: "Python — pytest.mark categorization (advisory)"
        status: approved
        scope: ["**/*.py"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: tag every test function with a @pytest.mark that identifies
          its category — @pytest.mark.unit, @pytest.mark.integration,
          @pytest.mark.e2e (or the project's equivalent markers registered
          in pytest.ini/pyproject.toml). CI can then run the fast unit suite
          on every commit and the slower integration suite on merge.
          NEVER: ship a test suite with no markers where all tests run in
          one undifferentiated block — a 200-test suite that takes 90
          seconds can not be split into a 5-second pre-commit gate and a
          full CI run; every commit pays the full cost.
        rationale: |
          A linter sees valid test functions and passes. It cannot know the
          project's marker taxonomy or whether a test is mis-categorized.
          The reviewer checks that new tests carry the right mark so the
          test pyramid stays enforceable in CI.
