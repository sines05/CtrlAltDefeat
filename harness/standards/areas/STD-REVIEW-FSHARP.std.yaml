id: STD-REVIEW-FSHARP
type: std_area
zone: operational
title: "Review — F#"
status: approved
owner: harness
version: 1.0.0
description: |
  F# review rules (scope **/*.fs, **/*.fsx, **/*.fsproj, **/appsettings*.json).
  Safety rules around SQL injection, secret management, and type-safe input
  validation, plus advisory rules for discriminated unions, computation
  expressions, and property-based testing.
rule_groups:
  - id: STD-REVIEW-FSHARP-RG1
    title: "Safety — SQL, secrets, input validation"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-FSHARP-RG1-R1
        title: "Parameterized queries — never SQL string concatenation"
        status: approved
        scope: ["**/*.fs", "**/*.fsx"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use parameterized queries with ADO.NET, Dapper, or EF Core
          for every database operation. Validate sort fields and filter
          operators against a closed allowlist before composing dynamic
          queries.
          NEVER: concatenate a request value, query parameter, or external
          input into a SQL string — $"SELECT * FROM Orders WHERE CustomerId
          = {input}" is a full injection vector regardless of the data-access
          library wrapping it. F#'s string interpolation makes injection
          syntactically clean but no less dangerous — the attacker does not
          care whether the injection was built with + or $.
        rationale: |
          Parameterized queries separate code from data at the database
          protocol level — no amount of quoting or escaping in application
          code can match that guarantee. F#'s type system can help here but
          only if you use it: a single-case discriminated union wrapping a
          validated string prevents unsanitized values from reaching the
          query, but string interpolation bypasses that guard.
      - id: STD-REVIEW-FSHARP-RG1-R2
        title: "Type-safe input validation — single-case DUs for validated values"
        status: approved
        scope: ["**/*.fs", "**/*.fsx"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: validate inputs at the application boundary using types —
          wrap validated values in single-case discriminated unions with a
          private constructor and a create function that returns
          Result<ValidatedT, string>. Use Result<'T, 'TError> with railway-
          oriented programming for operations that can fail.
          NEVER: pass a raw string, int, or other primitive into domain logic
          when a semantic constraint exists (email format, positive amount,
          non-empty ID) — the domain function sees a string, not a ValidatedEmail,
          and must either re-validate (duplicating the boundary check) or
          trust it (opening the door to invalid data). A raw string that
          should have been a ValidatedEmail is a type-system failure: the
          compiler could have prevented it.
        rationale: |
          F#'s type system is the strongest input-validation tool available —
          a single-case DU like ValidatedEmail of string with a private
          constructor makes it impossible to create an invalid email without
          calling the validation function. Railway-oriented programming
          (Result.bind, Result.map) chains validated operations so that a
          failure at any step short-circuits the pipeline with a typed error.
      - id: STD-REVIEW-FSHARP-RG1-R3
        title: "Secrets from env, safe error responses"
        status: approved
        scope: ["**/*.fs", "**/*.fsx", "**/appsettings*.json"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: load secrets from environment variables, user secrets for
          local development, or a secret manager in production. Keep
          appsettings*.json free of real credentials. Return safe client-
          facing messages in API responses; log detailed exceptions with
          structured context server-side.
          NEVER: hardcode an API key, connection string, or token in source
          code — a committed secret is a leaked secret the moment the repo is
          cloned. Never expose exception messages, stack traces, SQL text, or
          filesystem paths in an HTTP response body — these are reconnaissance
          data for an attacker.
        rationale: |
          Secrets in source code survive every "temporary" commit in git
          history. Environment variables and secret managers keep credentials
          out of the repo entirely. Exception details in API responses leak
          framework version, namespace hierarchy, and internal file paths —
          an attacker chains these to map the attack surface and find
          vulnerable versions.
  - id: STD-REVIEW-FSHARP-RG2
    title: "Idioms — DUs, Option/Result, computation expressions"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-FSHARP-RG2-R1
        title: "Discriminated unions for domain modeling — not class hierarchies"
        status: approved
        scope: ["**/*.fs", "**/*.fsx"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: model business states with discriminated unions — each case
          carries only the data relevant to that state. Use exhaustive pattern
          matching (match) without a wildcard — the compiler proves every case
          is handled. Use records for data with named fields; use single-case
          DUs for type-safe wrappers around primitives.
          NEVER: model a state machine with a class hierarchy and a mutable
          status field — the caller must check the status and then cast to
          the right subclass, and nothing prevents accessing a field that is
          only valid in a different state. A discriminated union with
          exhaustive match makes invalid states unrepresentable. Never add
          a wildcard (_) to a match expression on a DU — new cases added
          later silently fall through to the default.
        rationale: |
          A DU like OrderStatus = Pending | Confirmed of DateTimeOffset |
          Shipped of string | Cancelled of string makes it impossible to
          have a "Shipped" order with no tracking number or a "Confirmed"
          order with a cancellation reason. A class hierarchy with a status
          field requires runtime checks and casts; the compiler cannot help.
      - id: STD-REVIEW-FSHARP-RG2-R2
        title: "Option over null, Result over exceptions"
        status: approved
        scope: ["**/*.fs", "**/*.fsx"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R6]
        detector: null
        description: |
          ALWAYS: use Option<'T> for values that may legitimately be absent
          — prefer Option.map, Option.bind, and Option.defaultValue over
          null checks. Use Result<'T, 'TError> with railway-oriented
          programming for operations that can fail — prefer Result.bind and
          Result.map over try/with for expected failures. Use computation
          expressions (result { }) to simplify sequential operations that
          may fail.
          NEVER: return null from an F# function when Option<'T> is available
          — null propagates silently, and the caller has no type-level signal
          that the value may be absent. Never throw an exception for a
          recoverable failure when Result<'T, 'TError> can carry the error
          as a typed value — an exception bypasses the type system and forces
          every caller to wrap the call in try/with or risk a crash.
        rationale: |
          null in F# exists only for .NET interop — idiomatic F# uses
          Option<'T>, which forces the caller to handle both Some and None
          cases. Result<'T, 'TError> makes failure part of the return type
          — the caller cannot ignore it. Computation expressions (result { })
          are F#'s equivalent of Rust's ? operator: they short-circuit on
          Error and unwrap Ok, eliminating the pyramid of match statements.
  - id: STD-REVIEW-FSHARP-RG3
    title: "Testing — framework, property-based testing"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-FSHARP-RG3-R1
        title: "Property-based testing with FsCheck"
        status: approved
        scope: ["**/*.fs", "**/*.fsx", "**/*.fsproj"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: use xUnit with FsUnit.xUnit for F#-friendly assertions;
          use Unquote for quotation-based assertions with clear failure
          messages. Use FsCheck.xUnit for property-based testing on pure
          domain functions — specify invariants (e.g., "the order total is
          never negative") and let FsCheck generate inputs. Test ASP.NET
          Core APIs through WebApplicationFactory<TEntryPoint> — not by
          bypassing middleware.
          NEVER: rely solely on example-based tests for pure domain logic
          when a property-based test would cover the entire input space —
          three example inputs prove nothing about the thousand edge cases
          between them. Never mock a dependency when a function stub or an
          in-memory fake would serve; F#'s function-first style makes stubs
          trivial (a lambda is a stub).
        rationale: |
          Property-based testing generates hundreds of inputs from the type
          signature and verifies an invariant holds for all of them — it
          finds edge cases the developer did not think to write examples for.
          FsCheck shrinks failing inputs to the minimal counterexample.
          F# functions are natural stubs — a lambda (fun _ -> Ok result)
          replaces a full mock framework, and the type checker verifies the
          signature matches.
