id: STD-REVIEW-TS
type: std_area
zone: operational
title: "Review — TypeScript / React"
status: approved
owner: harness
version: 1.0.0
description: |
  TypeScript type-level rules (**/*.ts, **/*.tsx) and React component/hook rules
  (**/*.tsx only). Enriched with type-safety, runtime-validation, immutability,
  and React component-pattern rules from ECC.
rule_groups:
  - id: STD-REVIEW-TS-RG1
    title: "TypeScript typing and React components/state/data-fetching"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-TS-RG1-R1
        title: "TypeScript"
        status: approved
        scope: ["**/*.ts", "**/*.tsx"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          Type-level rules for ALL TypeScript, backend or frontend.
          ALWAYS: full typing; declare an explicit interface/type for public
          shapes.
          NEVER: the any type where a concrete type is known.
        rationale: |
          React-specific component/hook rules live in the react rule, scoped to
          .tsx so a non-React TS file does not pull them.
      - id: STD-REVIEW-TS-RG1-R2
        title: "React"
        status: approved
        scope: ["**/*.tsx"]
        severity: info
        relates_to_std: [STD-REVIEW-TS-RG1-R1]
        detector: null
        description: |
          Scope **/*.tsx only — a pure .ts file does NOT pull these.
          ALWAYS: memo() only when a frequently re-rendering parent wraps an
          expensive child; useCallback() for handlers passed to children; keep
          server state in the data-fetching layer; subscribe to a selector-based
          store with selectors; a query hook for reads + a mutation hook for
          writes (invalidate affected queries); wrap sections in an error
          boundary with recovery and lazy-load pages behind Suspense.
          PREFER: a centralized query-keys factory over inline string keys.
          NEVER: memo() on a root/page component or when the parent rarely
          re-renders; useCallback/useMemo on one-time handlers or static JSX;
          inline JSX functions in render; a full-store destructure; an error
          boundary for an expected error (use try/catch there).
        rationale: |
          Memoization has a cost — applied everywhere it adds overhead without
          saving renders.
  - id: STD-REVIEW-TS-RG2
    title: "TypeScript type and runtime safety (advisory)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-TS-RG2-R1
        title: "TypeScript — unknown over any and error narrowing (advisory)"
        status: approved
        scope: ["**/*.ts", "**/*.tsx"]
        severity: info
        relates_to_std: [STD-REVIEW-TS-RG1-R1]
        detector: null
        description: |
          ALWAYS: use unknown as the catch-clause type and for any value of
          uncertain shape (API response, parsed JSON, third-party callback
          argument). Narrow unknown with type guards (typeof, instanceof,
          discriminated-union checks) before accessing properties.
          NEVER: use any to bypass type-checking on a value whose shape is
          unknown — any silently opts out of all type safety and a property
          access on an any-typed value that is null/undefined at runtime
          throws with no compile-time warning. NEVER access .message on a
          caught value without narrowing it first; a thrown value in
          JavaScript can be anything — a string, number, null, or undefined
          — and throw e.message will crash inside the catch block itself.
          PREFER: a typed Result<T, E> wrapper or a narrow-to-error helper
          for consistent error handling across catch blocks.
        rationale: |
          TypeScript's type-checker treats any as an escape hatch — it
          permits any property access, any assignment, and any function call
          without complaint. A linter configured with no-explicit-any can
          flag the keyword but cannot flag the downstream crash when e is
          not an Error. The reviewer verifies that every catch block narrows
          before accessing properties.
      - id: STD-REVIEW-TS-RG2-R2
        title: "TypeScript — runtime validation at boundaries (advisory)"
        status: approved
        scope: ["**/*.ts", "**/*.tsx"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: validate untrusted input at the system boundary with a
          runtime schema validator (Zod, Yup, io-ts) before casting it to a
          TypeScript type. Parse the input through the schema, then use the
          inferred type downstream — the validator proves the shape at
          runtime; the TypeScript type documents it at compile time.
          NEVER: use as TypeName on data from fetch(), a query parameter,
          a message queue, or localStorage — the as cast is a compile-time
          fiction; if the server returns {username: "x"} where the type
          expects {userName: string}, the cast lies and the property access
          silently returns undefined with no error thrown.
        rationale: |
          The as cast is a type-level assertion with zero runtime effect —
          it tells TypeScript "trust me" about data the compiler has never
          seen. A linter can flag as usage but cannot tell whether the data
          came from a trusted internal source or an untrusted boundary. The
          reviewer identifies boundary-crossing data and requires a runtime
          validation step before the cast.
      - id: STD-REVIEW-TS-RG2-R3
        title: "TypeScript — immutable updates (advisory)"
        status: approved
        scope: ["**/*.ts", "**/*.tsx"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: return a new object (via spread { ...obj, field: newValue }
          or structuredClone) rather than mutating an existing object's
          property and returning the same reference. Use Readonly<T> on
          function parameters to signal that the function will not mutate
          the input.
          NEVER: mutate a property on an object passed as an argument and
          return the same reference — the caller retains a reference to the
          now-mutated object and may not expect it; this is shared-mutable-
          state by accident and the source of order-dependent bugs and stale
          React renders (the reference didn't change, so React doesn't
          re-render).
        rationale: |
          A linter cannot distinguish intentional in-place mutation (updating
          a Map or a counter) from accidental shared-mutation of a data
          object. The reviewer sees the pattern: the function receives an
          object, mutates a property, and returns the same object — the
          caller's reference is now silently dirty.
  - id: STD-REVIEW-TS-RG3
    title: "React component patterns (advisory)"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-TS-RG3-R1
        title: "React — no React.FC, explicit prop typing (advisory)"
        status: approved
        scope: ["**/*.tsx"]
        severity: info
        relates_to_std: [STD-REVIEW-TS-RG1-R2]
        detector: null
        description: |
          ALWAYS: type component props with a named interface or type alias
          and use it directly in the function signature — function
          UserCard({ user, onSelect }: UserCardProps). This makes the props
          explicit, the return type inferable as JSX.Element, and the
          component callable without implicit children.
          NEVER: use React.FC<Props> as the component type annotation
          unless a specific reason demands it (e.g. a library that requires
          React.FC for static properties). React.FC silently adds an
          implicit children?: ReactNode prop to every component — a
          component that should not accept children now type-checks when
          children are passed, hiding the misuse until runtime.
          PREFER: a named interface over an inline type literal so the props
          shape is reusable in tests and stories.
        rationale: |
          A linter sees a valid React.FC usage and passes. The implicit-
          children problem is invisible at the call site: <UserCard>
            <div>oops</div>
          </UserCard> type-checks even though UserCard never renders
          children. The reviewer flags React.FC and requires explicit prop
          typing with no implicit children.
      - id: STD-REVIEW-TS-RG3-R2
        title: "React — explicit callback prop types (advisory)"
        status: approved
        scope: ["**/*.tsx"]
        severity: info
        relates_to_std: [STD-REVIEW-TS-RG1-R2]
        detector: null
        description: |
          ALWAYS: type every callback prop explicitly with its full signature
          — onSelect: (id: string) => void, not onSelect: Function or an
          untyped onSelect. The callback type documents the arguments the
          parent must supply and lets TypeScript catch a mismatch at the
          call site.
          NEVER: leave a callback prop untyped or typed as Function — a
          parent that passes a callback with the wrong number or type of
          arguments compiles without error and fails silently at runtime
          when the callback receives unexpected arguments.
        rationale: |
          An untyped callback prop is an any in disguise — any function
          satisfies it, but the wrong function signature causes a runtime
          malfunction with no compile-time error. A linter enforcing strict
          mode may catch some cases, but a reviewer catches the specific
          pattern of a callback prop declared without its argument types.
