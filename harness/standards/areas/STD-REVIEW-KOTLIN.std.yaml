id: STD-REVIEW-KOTLIN
type: std_area
zone: operational
title: "Review — Kotlin"
status: approved
owner: harness
version: 1.0.0
description: |
  Kotlin review rules (scope **/*.kt, **/*.kts). Safety rules around null-safety
  bypass, coroutine cancellation, and WebView security, plus advisory rules for
  sealed types, scope functions, and testing with fakes.
rule_groups:
  - id: STD-REVIEW-KOTLIN-RG1
    title: "Safety — null-safety bypass, cancellation, SQL, WebView"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-KOTLIN-RG1-R1
        title: "Ban !! (null-safety bypass)"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: critical
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use safe-call (?.), Elvis (?:), requireNotNull(), or
          checkNotNull() to handle nullable values. Use ?.let {} for scoped
          null-safe operations.
          NEVER: use the !! operator (not-null assertion) — it turns a null
          value into a NullPointerException at runtime, bypassing Kotlin's
          null-safety guarantees entirely. Every !! in production code is a
          crash the type system could have prevented. A developer who writes
          user!!.name is saying "I know this is never null" without evidence;
          the runtime will prove them wrong on a cold path they did not test.
        rationale: |
          !! is Kotlin's escape hatch from null-safety — it suppresses the
          compiler error without handling the null case. requireNotNull()
          at least provides a clear error message and throws at the assertion
          site; ?. and ?: handle null without throwing. The only defensible
          use of !! is in test code where the test should crash if the
          fixture is broken.
      - id: STD-REVIEW-KOTLIN-RG1-R2
        title: "Never catch CancellationException — always rethrow"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: critical
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: rethrow CancellationException immediately in any catch block
          — do not log it, suppress it, or wrap it. Use
          kotlinx.coroutines.currentCoroutineContext().ensureActive() before
          long-running loops.
          NEVER: catch CancellationException in a general catch (e: Exception)
          block without rethrowing it — swallowing cancellation breaks
          structured concurrency: the parent coroutine waits forever for a
          child that was cancelled but never stopped, leaking the coroutine
          and every resource it holds.
        rationale: |
          CancellationException is Kotlin's cooperative cancellation signal.
          A catch (e: Exception) block that swallows it turns cancellation
          into a silent no-op — the coroutine keeps running, holding locks,
          connections, and memory until the process ends. The compiler cannot
          detect this because CancellationException extends
          IllegalStateException, not a sealed hierarchy.
      - id: STD-REVIEW-KOTLIN-RG1-R3
        title: "SQL injection — parameterized Room/SQLDelight queries only"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: use parameterized queries in Room (@Query with named
          parameters) and SQLDelight. Validate and sanitize all user input
          before it reaches a database operation.
          NEVER: concatenate user input into a SQL string inside a @Query
          annotation or raw SQL execution — $"SELECT * FROM items WHERE name
          = '$input'" in a Room @Query is an injection vector that bypasses
          every ORM guard. Room's compile-time query verification cannot
          protect against runtime string assembly.
        rationale: |
          Room verifies SQL at compile time against the schema, but string
          interpolation happens at runtime, after verification. The compiler
          sees a parameterized query; the runtime sees a concatenated string
          with attacker-controlled content. SQLDelight generates type-safe
          queries from .sq files — concatenating user input into those is
          equivalent to writing raw SQL with string building.
      - id: STD-REVIEW-KOTLIN-RG1-R4
        title: "WebView — disable JavaScript, validate URLs"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: critical
        relates_to_std: [STD-REVIEW-COMMON-RG1-R2]
        detector: null
        description: |
          ALWAYS: disable JavaScript in WebView unless the loaded content
          explicitly requires it (settings.javaScriptEnabled = false). Validate
          every URL before loading with shouldOverrideUrlLoading(), and never
          expose @JavascriptInterface methods that access sensitive data.
          NEVER: load an unvalidated URL from a deep link, push notification
          payload, or QR scan into a WebView — this is a universal cross-site
          scripting vector on Android. An exported JavascriptInterface method
          that touches files, preferences, or tokens gives every webpage
          loaded in that WebView the same access.
        rationale: |
          WebView with JavaScript enabled and an unvalidated URL is a full
          browser with no address bar — the user cannot tell what domain they
          are on, and the page can call any @JavascriptInterface method.
          Disabling JavaScript and validating URLs with shouldOverrideUrlLoading
          closes both the script-execution and navigation-hijack vectors.
  - id: STD-REVIEW-KOTLIN-RG2
    title: "Idioms — sealed types, scope functions, immutability"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-KOTLIN-RG2-R1
        title: "Exhaustive when with sealed types"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: use sealed classes or sealed interfaces to model closed
          state hierarchies (e.g. UiState, Result). Use exhaustive when
          expressions without an else branch — the compiler proves every
          case is handled and flags new variants at compile time.
          NEVER: add an else branch to a when on a sealed type — this
          silently swallows new variants added later, turning a compile-time
          error into a runtime bug. A when on a sealed type that has an else
          branch is a bug: the developer bypassed exhaustiveness checking
          and the compiler can no longer help when the hierarchy grows.
        rationale: |
          Sealed types with exhaustive when are Kotlin's pattern-matching
          guarantee — adding a new state variant forces every when to be
          updated. An else branch short-circuits this: the compiler accepts
          the code, and the new variant falls through to a default that was
          written before the variant existed.
      - id: STD-REVIEW-KOTLIN-RG2-R2
        title: "Right scope function for the job"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: info
        relates_to_std: []
        detector: null
        description: |
          ALWAYS: choose the scope function by its purpose: let for null
          check + transform, run for computing a result on a receiver,
          apply for configuring an object, also for side effects.
          NEVER: nest scope functions more than 2 levels deep — three or more
          nested lets/runs/applies turn a readable pipeline into a puzzle
          where the reader must track which implicit receiver (it / this) is
          active at each level. Never use apply when the block is computing
          and returning a value (use run) or let when you only need side
          effects (use also).
        rationale: |
          Each scope function has a distinct contract: let returns the lambda
          result, apply returns the receiver, run returns the lambda result
          with this as receiver, also returns the receiver with it as
          argument. Mixing them loses the intent — the reader must reverse-
          engineer the purpose from the body rather than reading the function
          name. Deep nesting compounds this because it and this swap at each
          level.
  - id: STD-REVIEW-KOTLIN-RG3
    title: "Testing — fakes over mocks, coroutine testing"
    status: approved
    owner: harness
    rules:
      - id: STD-REVIEW-KOTLIN-RG3-R1
        title: "Fakes over mocking frameworks"
        status: approved
        scope: ["**/*.kt", "**/*.kts"]
        severity: info
        relates_to_std: [STD-REVIEW-COMMON-RG1-R4]
        detector: null
        description: |
          ALWAYS: prefer hand-written fakes over mocking frameworks (Mockito,
          MockK) for Repository and DataSource interfaces. A fake is a
          real implementation that stores state in memory and exposes
          configuration hooks for error injection.
          NEVER: use a mocking framework when the interface has more than
          two methods that return data — the mock setup grows into a second
          implementation that is harder to read than the real thing, and a
          refactored method signature produces a test that compiles but
          silently returns the mock default (zero/null) instead of the
          intended value.
        rationale: |
          A FakeItemRepository is 20 lines, readable by anyone, and breaks
          at compile time when the interface changes. A MockK mock with
          every { repository.getAll() } returns listOf() is a runtime binding
          — the test compiles regardless of the interface, and a changed
          method silently returns a default. Fakes also compose: one fake
          can be reused across every test that needs that dependency.
