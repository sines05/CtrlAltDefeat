# hooks-registration.yaml — INPUT for the installer (documentation +
# the installer reads this; dev-loop NEVER edits the repo's own
# .claude/settings.json).
#
# Maps Claude Code hook events to harness hook commands. The installer
# materializes these into the TARGET repo's .claude/settings.json when
# invoked explicitly, and copies git_hooks entries into .git/hooks/.
# $HARNESS_ROOT below means the repo root containing harness/.
# $HARNESS_PY is the Python interpreter, resolved per platform at install
# time (`python3` on POSIX, `python` on Windows; override with the
# HARNESS_PY env) — never hard-wire `python3`, absent on a stock Windows.
hooks:
  # Telemetry hooks (class telemetry: ON, fail-open, never block a tool). Each
  # appends one JSONL line under state/telemetry/ for a read-only lens. Bash
  # duration is PAIRED: mark_bash_start (Pre) stamps a monotonic start keyed on
  # the command; track_script_execution (Post) reads+clears it to compute ms.


  # --- in-process dispatcher (hook_dispatch.py) — one command per (event,matcher)
  # group; the group→cores map lives in harness/data/hook-dispatch.yaml. Replaces the
  # per-hook spawns removed above for these groups (no hook dropped — parity-tested).
  - event: PreToolUse
    matcher: Bash
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Bash"
    class: compliance   # dispatcher: runs the Bash gate lane in one process (per-core posture)
  - event: PostToolUse
    matcher: Write|Edit|MultiEdit
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PostToolUse "Write|Edit|MultiEdit"
    class: telemetry
  - event: SubagentStop
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py SubagentStop
    class: telemetry
  - event: UserPromptExpansion
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py UserPromptExpansion
    class: telemetry
  - event: Notification
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py Notification
    class: telemetry

  - event: UserPromptSubmit
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py UserPromptSubmit
    class: telemetry   # dispatcher: inject_prompt_context + nudge_context_inject + disabled_ref_nudge
  - event: PreToolUse
    matcher: Write
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Write"
    class: nudge
  - event: PreToolUse
    matcher: Read|NotebookRead
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Read|NotebookRead"
    class: compliance   # privacy_read_guard cage
  - event: PreToolUse
    matcher: Read|Grep|Glob
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Read|Grep|Glob"
    class: nudge
  - event: PreToolUse
    matcher: Read|Write|Edit|MultiEdit|Glob|Grep|Bash
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Read|Write|Edit|MultiEdit|Glob|Grep|Bash"
    class: compliance   # scout_block_guard wide-matcher gate

  - event: PreToolUse
    matcher: Write|Edit|MultiEdit
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Write|Edit|MultiEdit"
    class: compliance   # write_guard + agent_rbac cage + rule_nudge
  - event: PostToolUse
    matcher: Bash
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PostToolUse "Bash"
    class: telemetry   # track_script + bash_write_guard + manual_test_anchor

  - event: SessionStart
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py SessionStart
    class: telemetry   # session_init + voice/glossary/prompt-context injectors + pending/setup
  - event: SubagentStart
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py SubagentStart
    class: telemetry   # subagent_init register inject + mutation_guard --start
  - event: Stop
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py Stop
    class: telemetry   # nudge/telem Stop lane (reinject decision:block, gemini review, memory-gap...)
  - event: PreToolUse
    matcher: Agent|Task
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Agent|Task"
    class: compliance   # explore_model_guard
  - event: PreToolUse
    matcher: Skill
    command: $HARNESS_PY $HARNESS_ROOT/harness/hooks/hook_dispatch.py PreToolUse "Skill"
    class: compliance   # disabled_skill_router cage + track + isolation/hygiene nudges + auto_finalize





git_hooks:
  - hook: pre-push
    source: harness/install/git-pre-push-hook.sh
    # Transport-level defense-in-depth for the push stage: catches
    # pushes spelled through sh -c / eval / aliases that the Bash-command
    # detector cannot see.
